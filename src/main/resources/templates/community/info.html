<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>社群信息管理 - 社群运营中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden">

<!-- 侧边栏 -->
<div class="bg-blue-800 shadow-xl w-64 flex flex-col z-20">
    <div class="text-white text-xl font-bold p-5 flex items-center border-b border-blue-700">
        <span class="mr-2">🎯</span> 社群运营中心
    </div>
    <ul class="flex flex-col py-4 flex-1 text-blue-100 font-medium space-y-1">
        <a href="/community/info" class="px-6 py-3 bg-blue-700 text-white border-l-4 border-yellow-400 block">社群信息管理</a>
        <a href="/community/member" class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">成员管理</a>
        <a href="/community/post" class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">帖子管理</a>
        <a href="/community/activity" class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">活动内容与评论管理</a>
        <a href="/community/profile" class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">个人信息管理</a>
    </ul>
    <div class="p-4 border-t border-blue-700">
        <a href="/" class="block w-full text-center bg-blue-700 hover:bg-red-500 hover:text-white py-2.5 rounded-lg transition-colors text-sm font-medium">退出登录</a>
    </div>
</div>

<!-- 主内容 -->
<div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white shadow-sm p-5 flex justify-between items-center border-b border-gray-100">
        <h2 class="text-lg font-bold text-gray-800">社群信息管理</h2>
        <div class="flex items-center space-x-3">
            <span class="text-sm font-medium text-gray-600">社长</span>
            <div class="h-9 w-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold border border-blue-200">社</div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-gray-50 p-8">
        <div class="max-w-lg mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                <div id="community-avatar-area" class="flex items-center space-x-4 mb-8 pb-6 border-b border-gray-100">
                    <img id="communityAvatar" src="" alt="社群头像" class="h-16 w-16 rounded-full object-cover shadow">
                    <div>
                        <h3 id="communityNameDisplay" class="text-lg font-bold text-gray-800">加载中...</h3>
                        <p class="text-sm text-gray-400">修改社群基本信息</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">社群名称</label>
                        <input type="text" id="communityName" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="社群名称">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">社群简介</label>
                        <textarea id="communityDesc" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none transition-colors" placeholder="社群简介"></textarea>
                    </div>

                    <div id="msg-area" class="hidden text-sm px-4 py-2 rounded-lg"></div>

                    <button onclick="updateInfo()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium transition-colors shadow-sm">
                        保存修改
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadInfo);

    function loadInfo() {
        fetch('/api/community/info')
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    const c = res.data;
                    document.getElementById('communityNameDisplay').textContent = c.name;
                    document.getElementById('communityAvatar').src = c.avatar || '';
                    document.getElementById('communityName').value = c.name;
                    document.getElementById('communityDesc').value = c.description || '';
                } else {
                    showMsg(res.msg, true);
                }
            });
    }

    function showMsg(text, isError) {
        const el = document.getElementById('msg-area');
        el.textContent = text;
        el.className = isError
            ? 'text-sm px-4 py-2 rounded-lg bg-red-50 text-red-600'
            : 'text-sm px-4 py-2 rounded-lg bg-green-50 text-green-600';
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 3000);
    }

    function updateInfo() {
        const name = document.getElementById('communityName').value.trim();
        const desc = document.getElementById('communityDesc').value.trim();
        if (!name) return showMsg('社群名称不能为空', true);

        const fd = new URLSearchParams();
        fd.append('name', name);
        fd.append('description', desc);
        fetch('/api/community/info/update', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                showMsg(res.msg, res.code !== 200);
                if (res.code === 200) {
                    document.getElementById('communityNameDisplay').textContent = name;
                }
            });
    }
</script>
</body>
</html>

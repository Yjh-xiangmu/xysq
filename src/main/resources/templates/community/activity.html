<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>活动内容与评论管理 - 社群运营中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden">

<!-- 侧边栏 -->
<div class="bg-blue-800 shadow-xl w-64 flex flex-col z-20">
    <div class="text-white text-xl font-bold p-5 flex items-center border-b border-blue-700">
        <span class="mr-2">🎯</span> 社群运营中心
    </div>
    <ul class="flex flex-col py-4 flex-1 text-blue-100 font-medium space-y-1">
        <a href="/community/info"     class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">社群信息管理</a>
        <a href="/community/member"   class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">成员管理</a>
        <a href="/community/post"     class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">帖子管理</a>
        <a href="/community/activity" class="px-6 py-3 bg-blue-700 text-white border-l-4 border-yellow-400 block">活动内容与评论管理</a>
        <a href="/community/profile"  class="px-6 py-3 hover:bg-blue-700 hover:text-white border-l-4 border-transparent block">个人信息管理</a>
    </ul>
    <div class="p-4 border-t border-blue-700">
        <a href="/" class="block w-full text-center bg-blue-700 hover:bg-red-500 hover:text-white py-2.5 rounded-lg transition-colors text-sm font-medium">退出登录</a>
    </div>
</div>

<!-- 主内容 -->
<div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white shadow-sm p-5 flex justify-between items-center border-b border-gray-100">
        <h2 class="text-lg font-bold text-gray-800">活动内容与评论管理</h2>
        <div class="flex items-center space-x-3">
            <span class="text-sm font-medium text-gray-600">社长</span>
            <div class="h-9 w-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold border border-blue-200">社</div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-gray-50">
        <!-- Tab 导航 -->
        <div class="bg-white border-b border-gray-200 px-8">
            <div class="flex space-x-0">
                <button id="tab-publish" onclick="switchTab('publish')"
                    class="px-5 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 transition-colors">
                    发布新活动
                </button>
                <button id="tab-list" onclick="switchTab('list')"
                    class="px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors">
                    活动列表与报名
                </button>
                <button id="tab-comments" onclick="switchTab('comments')"
                    class="px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors">
                    评论管理
                </button>
            </div>
        </div>

        <div class="p-8">

            <!-- ===== Tab 1: 发布新活动 ===== -->
            <div id="panel-publish">
                <div class="max-w-2xl bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                    <h3 class="text-base font-semibold text-gray-800 mb-6 pb-4 border-b border-gray-100">活动策划与发布</h3>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">活动标题</label>
                            <input type="text" id="actTitle" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500" placeholder="例如：周末吉他指弹教学分享会">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">活动开始时间</label>
                                <input type="datetime-local" id="actTime" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">活动结束时间</label>
                                <input type="datetime-local" id="actEndTime" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">活动地点</label>
                            <input type="text" id="actLocation" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500" placeholder="例如：综合楼402">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">活动详情要求</label>
                            <textarea id="actContent" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 resize-none" placeholder="请描述活动的具体内容和报名要求..."></textarea>
                        </div>
                        <div id="publish-msg" class="hidden text-sm px-4 py-2 rounded-lg"></div>
                        <button onclick="submitActivity()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors shadow">确认发布</button>
                    </div>
                </div>
            </div>

            <!-- ===== Tab 2: 活动列表与报名 ===== -->
            <div id="panel-list" class="hidden">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                        <h3 class="text-base font-semibold text-gray-800">已发布活动</h3>
                        <button onclick="loadActivityList()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">刷新</button>
                    </div>
                    <div id="activity-list-area" class="divide-y divide-gray-100">
                        <div class="py-10 text-center text-sm text-gray-400">正在加载...</div>
                    </div>
                </div>
            </div>

            <!-- ===== Tab 3: 评论管理 ===== -->
            <div id="panel-comments" class="hidden">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                        <h3 class="text-base font-semibold text-gray-800">社群评论列表</h3>
                        <span class="text-xs text-gray-400">可删除违规评论</span>
                    </div>
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">评论者</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">评论内容</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase w-28">类型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">所属帖子</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase w-32">时间</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase w-20">操作</th>
                        </tr>
                        </thead>
                        <tbody id="comment-list-body" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="6" class="py-10 text-center text-sm text-gray-400">正在加载...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- 报名名单弹窗 -->
<div id="sign-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
            <h3 id="modal-title" class="text-base font-bold text-gray-800">报名名单</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
        </div>
        <div class="p-6 max-h-80 overflow-y-auto">
            <table class="min-w-full">
                <thead>
                <tr class="text-xs text-gray-500 border-b border-gray-100">
                    <th class="pb-2 text-left font-medium">学号</th>
                    <th class="pb-2 text-left font-medium">昵称</th>
                    <th class="pb-2 text-left font-medium">报名时间</th>
                </tr>
                </thead>
                <tbody id="sign-modal-body" class="divide-y divide-gray-50 text-sm">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 活动详情弹窗 -->
<div id="activity-detail-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
            <h3 class="text-base font-bold text-gray-800">活动详情</h3>
            <button onclick="document.getElementById('activity-detail-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
        </div>
        <div id="act-detail-content" class="p-6 max-h-96 overflow-y-auto"></div>
    </div>
</div>

<!-- 报名申请弹窗 -->
<div id="sign-req-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl mx-4 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
            <h3 id="sign-req-modal-title" class="text-base font-bold text-gray-800">报名申请</h3>
            <button onclick="document.getElementById('sign-req-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
        </div>
        <div class="p-4 max-h-96 overflow-y-auto">
            <table class="min-w-full">
                <thead>
                <tr class="text-xs text-gray-500 border-b border-gray-100">
                    <th class="pb-2 px-4 text-left font-medium">申请人</th>
                    <th class="pb-2 px-4 text-left font-medium">真实姓名</th>
                    <th class="pb-2 px-4 text-left font-medium">联系电话</th>
                    <th class="pb-2 px-4 text-left font-medium">状态</th>
                    <th class="pb-2 px-4 text-right font-medium">操作</th>
                </tr>
                </thead>
                <tbody id="sign-req-body" class="divide-y divide-gray-50 text-sm"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 设置时间最小值为当前时间（禁止选过去）
    const actTimeInput = document.getElementById('actTime');
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    actTimeInput.min = now.toISOString().slice(0, 16);

    document.addEventListener('DOMContentLoaded', () => {
        // 默认加载发布 Tab
    });

    // ===== Tab 切换 =====
    function switchTab(tab) {
        ['publish', 'list', 'comments'].forEach(t => {
            document.getElementById(`panel-${t}`).classList.add('hidden');
            const btn = document.getElementById(`tab-${t}`);
            btn.className = 'px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors';
        });
        document.getElementById(`panel-${tab}`).classList.remove('hidden');
        document.getElementById(`tab-${tab}`).className = 'px-5 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 transition-colors';

        if (tab === 'list') loadActivityList();
        if (tab === 'comments') loadComments();
    }

    // ===== 发布活动 =====
    function submitActivity() {
        const title = document.getElementById('actTitle').value.trim();
        const time = document.getElementById('actTime').value;
        const endTime = document.getElementById('actEndTime').value;
        const location = document.getElementById('actLocation').value.trim();
        const content = document.getElementById('actContent').value.trim();
        if (!title || !time || !location || !content) return showPublishMsg('请把所有字段填写完整', true);
        if (new Date(time) < new Date()) return showPublishMsg('活动开始时间不能早于当前时间', true);
        if (endTime && new Date(endTime) <= new Date(time)) return showPublishMsg('结束时间必须晚于开始时间', true);

        const fd = new URLSearchParams();
        fd.append('title', title);
        fd.append('eventTime', time);
        if (endTime) fd.append('endTime', endTime);
        fd.append('location', location);
        fd.append('content', content);

        fetch('/api/community/activity/publish', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    showPublishMsg('活动发布成功！', false);
                    document.getElementById('actTitle').value = '';
                    document.getElementById('actTime').value = '';
                    document.getElementById('actEndTime').value = '';
                    document.getElementById('actLocation').value = '';
                    document.getElementById('actContent').value = '';
                } else showPublishMsg(res.msg, true);
            });
    }

    function showPublishMsg(text, isError) {
        const el = document.getElementById('publish-msg');
        el.textContent = text;
        el.className = isError
            ? 'text-sm px-4 py-2 rounded-lg bg-red-50 text-red-600'
            : 'text-sm px-4 py-2 rounded-lg bg-green-50 text-green-600';
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 3000);
    }

    // ===== 活动列表 =====
    function loadActivityList() {
        fetch('/api/community/activity/list')
            .then(r => r.json())
            .then(res => {
                const area = document.getElementById('activity-list-area');
                if (res.code !== 200) { area.innerHTML = `<div class="py-8 text-center text-red-500 text-sm">${res.msg}</div>`; return; }
                if (!res.data || res.data.length === 0) {
                    area.innerHTML = '<div class="py-10 text-center text-sm text-gray-400">暂无活动</div>';
                    return;
                }
                area.innerHTML = res.data.map(a => {
                    const et = new Date(a.eventTime);
                    const timeStr = `${et.getFullYear()}-${String(et.getMonth()+1).padStart(2,'0')}-${String(et.getDate()).padStart(2,'0')} ${String(et.getHours()).padStart(2,'0')}:${String(et.getMinutes()).padStart(2,'0')}`;
                    const endStr = a.endTime ? ` → ${new Date(a.endTime).toLocaleDateString('zh')} ${String(new Date(a.endTime).getHours()).padStart(2,'0')}:${String(new Date(a.endTime).getMinutes()).padStart(2,'0')}` : '';
                    return `
                    <div class="px-6 py-5 flex items-center justify-between hover:bg-gray-50 transition-colors">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center space-x-3 mb-1">
                                <span class="font-semibold text-gray-800 text-sm cursor-pointer hover:text-blue-600" onclick="viewActivityDetail(${a.id})">${escapeHtml(a.title)}</span>
                                <span class="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">已报名 ${a.signCount} 人</span>
                            </div>
                            <p class="text-xs text-gray-400">🕒 ${timeStr}${endStr} &nbsp; 📍 ${escapeHtml(a.location)}</p>
                        </div>
                        <div class="flex items-center space-x-2 ml-4 flex-shrink-0">
                            <button onclick="viewActivityDetail(${a.id})"
                                class="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded text-xs font-medium transition-colors">查看内容</button>
                            <button onclick="viewSignRequests(${a.id}, '${escapeHtml(a.title)}')"
                                class="text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded text-xs font-medium transition-colors">报名申请</button>
                            <button onclick="deleteActivity(${a.id})"
                                class="text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded text-xs font-medium transition-colors">删除</button>
                        </div>
                    </div>`;
                }).join('');
            });
    }

    function deleteActivity(id) {
        if (!confirm('确定删除该活动及所有报名记录吗？')) return;
        const fd = new URLSearchParams();
        fd.append('activityId', id);
        fetch('/api/community/activity/delete', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) loadActivityList();
                else alert('❌ ' + res.msg);
            });
    }

    // ===== 报名名单弹窗 =====
    function viewSignList(activityId, title) {
        document.getElementById('modal-title').textContent = '「' + title + '」报名名单';
        document.getElementById('sign-modal-body').innerHTML = '<tr><td colspan="3" class="py-4 text-center text-gray-400 text-sm">加载中...</td></tr>';
        document.getElementById('sign-modal').classList.remove('hidden');

        fetch(`/api/community/activity/signList?activityId=${activityId}`)
            .then(r => r.json())
            .then(res => {
                const tbody = document.getElementById('sign-modal-body');
                if (res.code !== 200 || !res.data || res.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="py-6 text-center text-gray-400 text-sm">暂无报名记录</td></tr>';
                    return;
                }
                tbody.innerHTML = res.data.map((s, i) => {
                    const d = new Date(s.signTime);
                    const t = `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    return `<tr class="hover:bg-gray-50">
                        <td class="py-2.5 text-sm text-gray-700">${s.studentNo}</td>
                        <td class="py-2.5 text-sm text-gray-700">${s.nickname || '-'}</td>
                        <td class="py-2.5 text-xs text-gray-400">${t}</td>
                    </tr>`;
                }).join('');
            });
    }

    function closeModal() {
        document.getElementById('sign-modal').classList.add('hidden');
    }

    // ===== 评论管理 =====
    function loadComments() {
        fetch('/api/community/comment/list')
            .then(r => r.json())
            .then(res => {
                const tbody = document.getElementById('comment-list-body');
                if (res.code !== 200) { tbody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-red-500">${res.msg}</td></tr>`; return; }
                if (!res.data || res.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="py-10 text-center text-sm text-gray-400">暂无评论</td></tr>';
                    return;
                }
                tbody.innerHTML = res.data.map(c => {
                    const d = new Date(c.createTime);
                    const t = `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    const typeBadge = c.isReply
                        ? `<span class="text-xs bg-purple-50 text-purple-600 px-2 py-0.5 rounded-full">回复</span>`
                        : `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">评论</span>`;
                    return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-3 text-sm font-medium text-gray-800">${escapeHtml(c.authorName)}</td>
                        <td class="px-6 py-3 text-sm text-gray-600 max-w-xs truncate">${escapeHtml(c.content)}</td>
                        <td class="px-6 py-3">${typeBadge}</td>
                        <td class="px-6 py-3 text-xs text-gray-400 max-w-[120px] truncate" title="${escapeHtml(c.postPreview)}">${escapeHtml(c.postPreview)}</td>
                        <td class="px-6 py-3 text-xs text-gray-400 whitespace-nowrap">${t}</td>
                        <td class="px-6 py-3 text-right">
                            <button onclick="deleteComment(${c.id})"
                                class="text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1 rounded text-xs font-medium transition-colors">删除</button>
                        </td>
                    </tr>`;
                }).join('');
            });
    }

    function deleteComment(id) {
        if (!confirm('确定删除该评论吗？其下的回复也将一并删除。')) return;
        const fd = new URLSearchParams();
        fd.append('commentId', id);
        fetch('/api/community/comment/delete', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) loadComments();
                else alert('❌ ' + res.msg);
            });
    }

    function viewActivityDetail(activityId) {
        document.getElementById('activity-detail-modal').classList.remove('hidden');
        document.getElementById('act-detail-content').innerHTML = '<p class="text-gray-400 text-sm">加载中...</p>';
        fetch(`/api/community/activity/detail?activityId=${activityId}`).then(r => r.json()).then(res => {
            if (res.code === 200) {
                const a = res.data;
                const et = new Date(a.eventTime);
                const ts = `${et.getFullYear()}-${String(et.getMonth()+1).padStart(2,'0')}-${String(et.getDate()).padStart(2,'0')} ${String(et.getHours()).padStart(2,'0')}:${String(et.getMinutes()).padStart(2,'0')}`;
                document.getElementById('act-detail-content').innerHTML = `
                    <h4 class="text-lg font-bold text-gray-800 mb-3">${escapeHtml(a.title)}</h4>
                    <p class="text-sm text-gray-500 mb-1">🕒 活动时间：${ts}</p>
                    <p class="text-sm text-gray-500 mb-4">📍 活动地点：${escapeHtml(a.location)}</p>
                    <div class="bg-gray-50 rounded-lg p-4 border border-gray-100">
                        <p class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${escapeHtml(a.content)}</p>
                    </div>`;
            } else document.getElementById('act-detail-content').innerHTML = `<p class="text-red-500 text-sm">${res.msg}</p>`;
        });
    }

    function viewSignRequests(activityId, title) {
        document.getElementById('sign-req-modal-title').textContent = '「' + title + '」报名申请';
        document.getElementById('sign-req-body').innerHTML = '<tr><td colspan="5" class="py-6 text-center text-gray-400 text-sm">加载中...</td></tr>';
        document.getElementById('sign-req-modal').classList.remove('hidden');

        fetch(`/api/community/activity/signRequests?activityId=${activityId}`).then(r => r.json()).then(res => {
            const tbody = document.getElementById('sign-req-body');
            if (res.code !== 200 || !res.data || res.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-6 text-center text-gray-400 text-sm">暂无报名申请</td></tr>';
                return;
            }
            tbody.innerHTML = res.data.map(s => {
                const statusBadge = s.status === 1 ? '<span class="text-green-600 bg-green-50 px-2 py-0.5 rounded text-xs">已通过</span>'
                    : s.status === 2 ? '<span class="text-red-600 bg-red-50 px-2 py-0.5 rounded text-xs">已拒绝</span>'
                    : '<span class="text-yellow-600 bg-yellow-50 px-2 py-0.5 rounded text-xs">待审核</span>';
                const actions = s.status === 0 ? `
                    <button onclick="auditSign(${s.signId}, 1)" class="text-green-600 bg-green-50 hover:bg-green-100 px-2 py-1 rounded text-xs font-medium mr-1">同意</button>
                    <button onclick="auditSign(${s.signId}, 2)" class="text-red-600 bg-red-50 hover:bg-red-100 px-2 py-1 rounded text-xs font-medium">拒绝</button>` : '-';
                return `<tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm text-gray-800 cursor-pointer hover:text-blue-600" onclick="viewSignDetail(this)" data-realname="${escapeHtml(s.realName||'-')}" data-phone="${escapeHtml(s.phone||'-')}" data-remark="${escapeHtml(s.remark||'-')}" data-nickname="${escapeHtml(s.nickname||'-')}" data-studentno="${escapeHtml(s.studentNo||'-')}">${escapeHtml(s.nickname||'-')} (${escapeHtml(s.studentNo||'-')})</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${escapeHtml(s.realName||'-')}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${escapeHtml(s.phone||'-')}</td>
                    <td class="px-4 py-3">${statusBadge}</td>
                    <td class="px-4 py-3 text-right">${actions}</td>
                </tr>`;
            }).join('');
        });
    }

    function viewSignDetail(el) {
        const d = el.dataset;
        alert(`申请人：${d.nickname}（${d.studentno}）\n真实姓名：${d.realname}\n联系电话：${d.phone}\n备注：${d.remark}`);
    }

    function auditSign(signId, status) {
        const fd = new URLSearchParams(); fd.append('signId', signId); fd.append('status', status);
        fetch('/api/community/activity/auditSign', { method: 'POST', body: fd }).then(r => r.json()).then(res => {
            alert(res.msg);
            // 刷新当前弹窗 - 简单重新点击不可行，关闭弹窗提示刷新
            if (res.code === 200) document.getElementById('sign-req-modal').classList.add('hidden');
        });
    }

    function escapeHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>

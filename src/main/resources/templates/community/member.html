<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>成员管理 - 社群运营中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden">
<div class="bg-blue-800 shadow-xl w-64 flex flex-col z-20">
    <div class="text-white text-xl font-bold p-5 flex items-center border-b border-blue-700">
        <span class="mr-2">🎯</span> 社群运营中心
    </div>
    <ul class="flex flex-col py-4 flex-1 text-blue-100 font-medium space-y-1">
        <a href="#" class="px-6 py-3 hover:bg-blue-700 hover:text-white cursor-pointer border-l-4 border-transparent block">社群信息管理</a>
        <a href="/community/member" class="px-6 py-3 bg-blue-700 text-white border-l-4 border-yellow-400 block">成员管理</a>
        <a href="#" class="px-6 py-3 hover:bg-blue-700 hover:text-white cursor-pointer border-l-4 border-transparent block">帖子管理</a>
        <a href="/community/activity" class="px-6 py-3 hover:bg-blue-700 hover:text-white cursor-pointer border-l-4 border-transparent block">活动内容与评论管理</a>
        <a href="#" class="px-6 py-3 hover:bg-blue-700 hover:text-white cursor-pointer border-l-4 border-transparent block">个人信息管理</a>
    </ul>
    <div class="p-4 border-t border-blue-700">
        <a href="/" class="block w-full text-center bg-blue-700 hover:bg-red-500 hover:text-white py-2.5 rounded-lg transition-colors text-sm font-medium">退出登录</a>
    </div>
</div>

<div class="flex-1 flex flex-col overflow-hidden relative">
    <header class="bg-white shadow-sm p-5 flex justify-between items-center z-10 border-b border-gray-100">
        <h2 class="text-lg font-bold text-gray-800">成员管理</h2>
        <div class="flex items-center space-x-3">
            <span class="text-sm font-medium text-gray-600">社长</span>
            <div class="h-9 w-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold border border-blue-200">社</div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-gray-50 p-8">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-800">入群申请审批</h3>
            </div>
            <div class="p-0">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">学号</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">昵称</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">申请时间</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                    </thead>
                    <tbody id="audit-list-body" class="bg-white divide-y divide-gray-200">
                    <tr><td colspan="4" class="px-6 py-10 text-center text-sm text-gray-400">正在加载数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadAuditList);

    function loadAuditList() {
        fetch('/api/community/member/auditList')
            .then(res => res.json())
            .then(res => {
                if (res.code === 200) renderAuditTable(res.data);
                else document.getElementById('audit-list-body').innerHTML = `<tr><td colspan="4" class="text-center text-red-500 py-10">${res.msg}</td></tr>`;
            });
    }

    function renderAuditTable(list) {
        const tbody = document.getElementById('audit-list-body');
        if (!list || list.length === 0) return tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-sm text-gray-400">暂无待处理的入群申请</td></tr>';

        let html = '';
        list.forEach(item => {
            const date = new Date(item.joinTime);
            const timeStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            html += `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${item.studentNo}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.nickname || '未设置'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${timeStr}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                        <button onclick="handleAudit(${item.recordId}, 1)" class="text-white bg-green-500 hover:bg-green-600 px-3 py-1.5 rounded transition-colors shadow-sm">同意</button>
                        <button onclick="handleAudit(${item.recordId}, 2)" class="text-gray-700 bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded transition-colors shadow-sm">拒绝</button>
                    </td>
                </tr>`;
        });
        tbody.innerHTML = html;
    }

    function handleAudit(recordId, status) {
        if (!confirm(`确定要 ${status === 1 ? '同意' : '拒绝'} 吗？`)) return;
        const formData = new URLSearchParams();
        formData.append('recordId', recordId);
        formData.append('status', status);

        fetch('/api/community/member/audit', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(res => {
                if (res.code === 200) loadAuditList();
                else alert("❌ " + res.msg);
            });
    }
</script>
</body>
</html>

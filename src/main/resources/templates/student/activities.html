<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>活动大厅 - 兴趣Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pt-16">

<nav class="bg-white shadow-sm fixed w-full z-20 top-0 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex space-x-8">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 tracking-tighter">兴趣Share</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="/student/index" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">社群广场</a>
                    <a href="/student/activities" class="text-indigo-600 font-semibold border-b-2 border-indigo-600 px-1 py-2">参与社群活动</a>
                    <a href="/student/posts" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">帖子管理</a>
                </div>
            </div>
            <div class="flex items-center space-x-5 relative">
                <div class="relative cursor-pointer flex items-center space-x-2" onclick="document.getElementById('nav-user-menu').classList.toggle('hidden')">
                    <img id="navAvatar" src="" class="h-9 w-9 rounded-full object-cover shadow-sm border border-gray-200 hidden">
                    <div id="navAvatarFallback" class="h-9 w-9 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 shadow-sm border-2 border-white flex items-center justify-center text-white font-bold text-sm">我</div>
                </div>
                <div id="nav-user-menu" class="hidden absolute right-0 top-full mt-1 w-36 bg-white rounded-xl shadow-lg py-2 border border-gray-100 z-30">
                    <a href="/student/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 font-medium">个人信息</a>
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="/" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-50 font-medium">退出登录</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8 mt-4">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-gray-800 mb-4 mt-8">校园活动大厅</h1>
        <p class="text-gray-500">发现精彩校园生活，一键报名参与</p>
    </div>

    <div class="flex space-x-1 mb-6 bg-white rounded-xl border border-gray-200 p-1 w-fit mx-auto shadow-sm">
        <button id="tab-all" onclick="switchTab('all')" class="px-5 py-2 rounded-lg text-sm font-medium bg-indigo-600 text-white transition-colors">全部活动</button>
        <button id="tab-history" onclick="switchTab('history')" class="px-5 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors">历史活动</button>
        <button id="tab-schedule" onclick="switchTab('schedule')" class="px-5 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors">我的日程</button>
    </div>

    <div id="panel-all" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-400 py-10">正在加载活动数据...</div>
    </div>
    <div id="panel-history" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-400 py-10">正在加载...</div>
    </div>
    <div id="panel-schedule" class="hidden space-y-4 max-w-2xl mx-auto">
        <div class="text-center text-gray-400 py-10">正在加载...</div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => { loadNavAvatar(); loadGlobalActivities(); });

    function loadNavAvatar() {
        fetch('/api/student/profile').then(r => r.json()).then(res => {
            if (res.code === 200 && res.data.avatar) {
                document.getElementById('navAvatar').src = res.data.avatar;
                document.getElementById('navAvatar').classList.remove('hidden');
                document.getElementById('navAvatarFallback').classList.add('hidden');
            }
        });
    }

    function switchTab(tab) {
        ['all','history','schedule'].forEach(t => {
            document.getElementById(`panel-${t}`).classList.add('hidden');
            const btn = document.getElementById(`tab-${t}`);
            btn.className = 'px-5 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors';
        });
        document.getElementById(`panel-${tab}`).classList.remove('hidden');
        document.getElementById(`tab-${tab}`).className = 'px-5 py-2 rounded-lg text-sm font-medium bg-indigo-600 text-white transition-colors';
        if (tab === 'history') loadHistoryActivities();
        if (tab === 'schedule') loadSchedule();
    }

    function loadGlobalActivities() {
        fetch('/api/student/activity/all')
            .then(res => res.json())
            .then(res => {
                if (res.code === 200) renderActivities(res.data, 'panel-all', false);
                else alert(res.msg);
            });
    }

    function loadHistoryActivities() {
        const container = document.getElementById('panel-history');
        container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">正在加载...</div>';
        fetch('/api/student/activity/history')
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) renderActivities(res.data, 'panel-history', true);
                else container.innerHTML = `<div class="col-span-full text-center text-red-400 py-10">${res.msg}</div>`;
            });
    }

    function loadSchedule() {
        const container = document.getElementById('panel-schedule');
        container.innerHTML = '<div class="text-center text-gray-400 py-10">正在加载...</div>';
        fetch('/api/student/activity/schedule')
            .then(r => r.json())
            .then(res => {
                if (res.code !== 200 || !res.data || res.data.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-10 bg-white rounded-xl border border-gray-200">暂无已报名的近期活动</div>';
                    return;
                }
                container.innerHTML = res.data.map(act => {
                    const t = formatTime(act.eventTime);
                    const eventMs = new Date(act.eventTime).getTime();
                    return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center justify-between">
                        <div>
                            <h4 class="font-bold text-gray-800 mb-1">${escapeHtml(act.title)}</h4>
                            <p class="text-sm text-gray-500">🕒 ${t} &nbsp;&nbsp; 📍 ${escapeHtml(act.location)}</p>
                            <p class="text-xs text-indigo-600 mt-1 bg-indigo-50 px-2 py-0.5 rounded-full inline-block">${act.communityName}</p>
                        </div>
                        <button onclick="setReminder(${eventMs}, '${escapeHtml(act.title)}')" class="ml-4 flex-shrink-0 bg-orange-50 hover:bg-orange-100 text-orange-600 px-4 py-2 rounded-lg text-sm font-medium transition-colors">⏰ 设提醒</button>
                    </div>`;
                }).join('');
            });
    }

    function setReminder(eventMs, title) {
        if (!('Notification' in window)) return alert('当前浏览器不支持通知提醒');
        Notification.requestPermission().then(perm => {
            if (perm !== 'granted') return alert('请允许通知权限以使用提醒功能');
            const now = Date.now();
            const delta = eventMs - now - 30 * 60 * 1000;
            if (delta <= 0) return alert('活动即将开始或已过去，无法设置提前30分钟提醒');
            setTimeout(() => {
                new Notification('活动提醒', { body: `「${title}」将在30分钟后开始，请做好准备！`, icon: '/favicon.ico' });
            }, delta);
            alert(`✅ 已设置提醒！将在活动开始前30分钟通知你。`);
        });
    }

    function formatTime(timeStr) {
        const date = new Date(timeStr);
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function renderActivities(activities, containerId, isHistory) {
        const container = document.getElementById(containerId);
        if (!activities || activities.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10 bg-white rounded-xl border border-gray-200">' + (isHistory ? '暂无参与过的历史活动' : '当前平台暂无进行中的活动') + '</div>';
            return;
        }

        let html = '';
        activities.forEach(act => {
            const eventTime = formatTime(act.eventTime);
            const expiredBadge = act.isExpired ? `<span class="ml-2 px-2 py-0.5 bg-gray-200 text-gray-500 rounded-full text-xs font-medium">已结束</span>` : '';
            let btnHtml = '';
            if (isHistory) {
                btnHtml = `<div class="w-full bg-gray-100 text-gray-500 py-2.5 rounded-lg text-sm font-medium text-center">已参与</div>`;
            } else if (act.isSigned) {
                btnHtml = `<button disabled class="w-full bg-gray-100 text-gray-500 py-2.5 rounded-lg text-sm font-medium cursor-not-allowed border border-gray-200">已报名</button>`;
            } else if (act.isExpired) {
                btnHtml = `<button disabled class="w-full bg-gray-100 text-gray-400 py-2.5 rounded-lg text-sm font-medium cursor-not-allowed">已结束</button>`;
            } else {
                btnHtml = `<button onclick="signActivity(${act.id})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm">立即报名</button>`;
            }

            html += `
                <div class="bg-white rounded-xl shadow-sm border ${act.isExpired ? 'border-gray-200 opacity-70' : 'border-gray-100'} overflow-hidden hover:shadow-lg transition-shadow duration-300 p-6 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-bold text-gray-800 line-clamp-2">${escapeHtml(act.title)}${expiredBadge}</h3>
                        <span class="bg-purple-50 text-purple-600 text-xs px-2 py-1 rounded-md whitespace-nowrap ml-2 font-medium">${escapeHtml(act.communityName)}</span>
                    </div>
                    <div class="space-y-2 mb-4 flex-1">
                        <p class="text-sm text-gray-600 flex items-center"><span class="mr-2 text-lg">🕒</span> ${eventTime}</p>
                        <p class="text-sm text-gray-600 flex items-center"><span class="mr-2 text-lg">📍</span> ${escapeHtml(act.location)}</p>
                        <p class="text-sm text-gray-500 line-clamp-3 mt-3 bg-gray-50 p-3 rounded-lg border border-gray-100">${escapeHtml(act.content)}</p>
                    </div>
                    <div class="mt-auto pt-4 border-t border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs text-gray-500 font-medium">已有 <span class="text-indigo-600 font-bold">${act.signCount}</span> 人报名</span>
                        </div>
                        ${btnHtml}
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function signActivity(activityId) {
        const formData = new URLSearchParams();
        formData.append('activityId', activityId);
        fetch('/api/student/activity/sign', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(res => {
                if (res.code === 200) { alert('报名成功！'); loadGlobalActivities(); }
                else alert(res.msg);
            });
    }

    function escapeHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.addEventListener('click', e => {
        const menu = document.getElementById('nav-user-menu');
        if (menu && !e.target.closest('#nav-user-menu') && !e.target.closest('[onclick*="nav-user-menu"]')) {
            menu.classList.add('hidden');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>活动大厅 - 兴趣Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pt-16">

<nav class="bg-white shadow-sm fixed w-full z-20 top-0 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex space-x-8">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 tracking-tighter">兴趣Share</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="/student/index" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">社群广场</a>
                    <a href="/student/activities" class="text-indigo-600 font-semibold border-b-2 border-indigo-600 px-1 py-2">参与社群活动</a>
                    <a href="/student/posts" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">帖子管理</a>
                </div>
            </div>
            <div class="flex items-center space-x-5 relative">
                <div class="group relative cursor-pointer flex items-center space-x-2">
                    <div class="h-9 w-9 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 shadow-sm border-2 border-white flex items-center justify-center text-white font-bold text-sm">我</div>
                    <div class="hidden group-hover:block absolute right-0 top-full mt-1 w-32 bg-white rounded-xl shadow-lg py-2 border border-gray-100">
                        <a href="/student/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 font-medium">个人信息</a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <a href="/" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-50 font-medium">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8 mt-4">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-gray-800 mb-4 mt-8">校园活动大厅</h1>
        <p class="text-gray-500">发现精彩校园生活，一键报名参与</p>
    </div>

    <div id="activity-plaza" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-400 py-10">正在加载活动数据...</div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', loadGlobalActivities);

    function loadGlobalActivities() {
        fetch('/api/student/activity/all')
            .then(res => res.json())
            .then(res => {
                if (res.code === 200) renderActivities(res.data);
                else alert(res.msg);
            });
    }

    function formatTime(timeStr) {
        const date = new Date(timeStr);
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function renderActivities(activities) {
        const container = document.getElementById('activity-plaza');
        if (!activities || activities.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10 bg-white rounded-xl border border-gray-200">当前平台暂无进行中的活动</div>';
            return;
        }

        let html = '';
        activities.forEach(act => {
            const eventTime = formatTime(act.eventTime);
            let btnHtml = act.isSigned
                ? `<button disabled class="w-full bg-gray-100 text-gray-500 py-2.5 rounded-lg text-sm font-medium cursor-not-allowed border border-gray-200">已报名</button>`
                : `<button onclick="signActivity(${act.id})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm">立即报名</button>`;

            html += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition-shadow duration-300 p-6 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-bold text-gray-800 line-clamp-2">${act.title}</h3>
                        <span class="bg-purple-50 text-purple-600 text-xs px-2 py-1 rounded-md whitespace-nowrap ml-2 font-medium">${act.communityName}</span>
                    </div>

                    <div class="space-y-2 mb-4 flex-1">
                        <p class="text-sm text-gray-600 flex items-center"><span class="mr-2 text-lg">🕒</span> ${eventTime}</p>
                        <p class="text-sm text-gray-600 flex items-center"><span class="mr-2 text-lg">📍</span> ${act.location}</p>
                        <p class="text-sm text-gray-500 line-clamp-3 mt-3 bg-gray-50 p-3 rounded-lg border border-gray-100">${act.content}</p>
                    </div>

                    <div class="mt-auto pt-4 border-t border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs text-gray-500 font-medium">已有 <span class="text-indigo-600 font-bold">${act.signCount}</span> 人报名</span>
                        </div>
                        ${btnHtml}
                    </div>
                </div>
                `;
        });
        container.innerHTML = html;
    }

    function signActivity(activityId) {
        const formData = new URLSearchParams();
        formData.append('activityId', activityId);

        fetch('/api/student/activity/sign', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(res => {
                if (res.code === 200) {
                    alert('报名成功！');
                    loadGlobalActivities(); // 刷新数据，按钮变灰
                } else alert(res.msg);
            });
    }
</script>
</body>
</html>

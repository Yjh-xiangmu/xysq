<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人信息 - 兴趣Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pt-16">
<nav class="bg-white shadow-sm fixed w-full z-20 top-0 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex space-x-8">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 tracking-tighter">兴趣Share</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="/student/index" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">社群广场</a>
                    <a href="/student/activities" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">参与社群活动</a>
                    <a href="/student/posts" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">帖子管理</a>
                </div>
            </div>
            <div class="flex items-center space-x-5 relative">
                <div class="group relative cursor-pointer flex items-center space-x-2">
                    <img id="navAvatar" src="" class="h-9 w-9 rounded-full object-cover shadow-sm border border-gray-200 hidden">
                    <div id="navAvatarFallback" class="h-9 w-9 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 shadow-sm border-2 border-white flex items-center justify-center text-white font-bold text-sm">我</div>

                    <div class="hidden group-hover:block absolute right-0 top-full mt-1 w-32 bg-white rounded-xl shadow-lg py-2 border border-gray-100">
                        <a href="/student/profile" class="block px-4 py-2 text-sm text-indigo-600 bg-indigo-50 font-medium">个人信息</a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <a href="/" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-50 font-medium">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-lg mx-auto px-4 py-10 mt-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-8 py-10 text-center relative">
            <div class="relative inline-block group cursor-pointer" onclick="document.getElementById('avatarInput').click()">
                <div id="avatarDisplay" class="h-24 w-24 rounded-full bg-white/30 flex items-center justify-center text-white text-3xl font-bold mx-auto border-4 border-white/60 overflow-hidden shadow-lg">
                    <span id="avatarLetter">?</span>
                </div>
                <div class="absolute inset-0 rounded-full bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <div class="text-center text-white">
                        <svg class="w-6 h-6 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span class="text-xs font-medium">换头像</span>
                    </div>
                </div>
            </div>
            <input type="file" id="avatarInput" accept="image/*" class="hidden" onchange="previewAvatar(event)">
            <h2 class="text-white text-xl font-bold mt-4" id="nicknameDisplay">加载中...</h2>
            <p class="text-indigo-200 text-sm mt-1" id="studentNoDisplay"></p>
            <p class="text-indigo-300 text-xs mt-1">点击头像选择新图片，保存资料后生效</p>
        </div>

        <div class="p-8 space-y-8">
            <div>
                <h3 class="text-base font-semibold text-gray-700 mb-4 flex items-center">
                    <span class="w-1 h-4 bg-indigo-500 rounded mr-2"></span>修改基本资料
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">昵称</label>
                        <input type="text" id="newNickname" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">个人简介</label>
                        <textarea id="newIntro" rows="2" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors resize-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">联系电话</label>
                        <input type="tel" id="newPhone" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">邮箱地址</label>
                        <input type="email" id="newEmail" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                    </div>

                    <button onclick="updateProfile()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg font-medium transition-colors shadow-sm mt-2">保存所有资料</button>
                </div>
            </div>

            <div class="border-t border-gray-100"></div>

            <div>
                <h3 class="text-base font-semibold text-gray-700 mb-4 flex items-center">
                    <span class="w-1 h-4 bg-indigo-500 rounded mr-2"></span>修改密码
                </h3>
                <div class="space-y-3">
                    <input type="password" id="oldPwd" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="当前密码">
                    <input type="password" id="newPwd" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="新密码（至少6位）">
                    <input type="password" id="confirmPwd" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="确认新密码">
                    <button onclick="updatePassword()" class="w-full bg-gray-700 hover:bg-gray-800 text-white py-2.5 rounded-lg font-medium transition-colors shadow-sm">确认修改密码</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/student/profile').then(r => r.json()).then(res => {
            if (res.code === 200) {
                const u = res.data;
                document.getElementById('nicknameDisplay').textContent = u.nickname || u.studentNo;
                document.getElementById('studentNoDisplay').textContent = '学号：' + u.studentNo;

                // 填充表单
                document.getElementById('newNickname').value = u.nickname || '';
                document.getElementById('newIntro').value = u.intro || '';
                document.getElementById('newPhone').value = u.phone || '';
                document.getElementById('newEmail').value = u.email || '';

                // 加载头像
                if (u.avatar) {
                    setAvatarDisplay(u.avatar);
                    // 顺便把导航栏的头像也显示出来
                    document.getElementById('navAvatar').src = u.avatar;
                    document.getElementById('navAvatar').classList.remove('hidden');
                    document.getElementById('navAvatarFallback').classList.add('hidden');
                } else {
                    document.getElementById('avatarLetter').textContent = (u.nickname || u.studentNo).charAt(0);
                }
            }
        });
    });

    function setAvatarDisplay(src) {
        const display = document.getElementById('avatarDisplay');
        display.innerHTML = `<img src="${src}" alt="头像" class="w-full h-full object-cover rounded-full">`;
    }

    function previewAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { alert('图片不能超过 2MB'); return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            setAvatarDisplay(e.target.result);
        };
        reader.readAsDataURL(file);
    }

    function updateProfile() {
        const nickname = document.getElementById('newNickname').value.trim();
        if (!nickname) return alert('昵称不能为空');

        const fd = new FormData();
        fd.append('nickname', nickname);
        fd.append('intro', document.getElementById('newIntro').value.trim());
        fd.append('phone', document.getElementById('newPhone').value.trim());
        fd.append('email', document.getElementById('newEmail').value.trim());

        const fileInput = document.getElementById('avatarInput');
        if (fileInput.files.length > 0) {
            fd.append('avatarFile', fileInput.files[0]);
        }

        fetch('/api/student/profile/update', { method: 'POST', body: fd }).then(r => r.json()).then(res => {
            alert(res.msg);
            if (res.code === 200) location.reload();
        });
    }

    function updatePassword() {
        const o = document.getElementById('oldPwd').value.trim();
        const n = document.getElementById('newPwd').value.trim();
        const c = document.getElementById('confirmPwd').value.trim();
        if (!o || !n || !c) return alert('请填写所有密码字段');
        if (n !== c) return alert('两次新密码不一致');
        if (n.length < 6) return alert('新密码不能少于6位');

        const fd = new URLSearchParams();
        fd.append('oldPwd', o);
        fd.append('newPwd', n);

        fetch('/api/student/password/update', { method: 'POST', body: fd }).then(r => r.json()).then(res => {
            alert(res.msg);
            if (res.code === 200) location.href = '/';
        });
    }
</script>
</body>
</html>

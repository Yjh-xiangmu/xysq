<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>兴趣Share - 发现社群</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pt-16">
<nav class="bg-white shadow-sm fixed w-full z-20 top-0 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex space-x-8">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 tracking-tighter">兴趣Share</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="/student/index" class="text-indigo-600 font-semibold border-b-2 border-indigo-600 px-1 py-2">社群广场</a>
                    <a href="/student/activities" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">参与社群活动</a>
                    <a href="/student/posts" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">帖子管理</a>
                </div>
            </div>
            <div class="flex items-center space-x-5 relative">
                <a href="/student/messages" id="msg-btn" class="relative text-gray-500 hover:text-indigo-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <span id="msg-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-4 w-4 flex items-center justify-center font-bold"></span>
                </a>
                <div class="relative" id="notif-wrap">
                    <div onclick="toggleNotifPanel()" class="relative text-gray-500 hover:text-indigo-600 transition-colors cursor-pointer">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span id="notif-badge" class="hidden absolute -top-1 -right-1 bg-orange-400 text-white text-xs rounded-full h-4 w-4 flex items-center justify-center font-bold"></span>
                    </div>
                    <div id="notif-panel" class="hidden absolute right-0 top-full mt-2 w-80 bg-white rounded-xl shadow-xl border border-gray-100 z-30">
                        <div class="flex items-center justify-between px-4 pt-3 pb-2 border-b border-gray-100">
                            <p class="text-sm font-semibold text-gray-700">互动消息</p>
                            <button onclick="markAllRead()" class="text-xs text-indigo-500 hover:text-indigo-700 font-medium">全部已读</button>
                        </div>
                        <div id="notif-list" class="overflow-y-auto max-h-72 divide-y divide-gray-50">
                            <p class="text-sm text-gray-400 text-center py-6">暂无新互动</p>
                        </div>
                        <div class="px-4 py-2 border-t border-gray-100">
                            <a href="/student/posts" class="block w-full text-center bg-indigo-600 hover:bg-indigo-700 text-white text-sm py-1.5 rounded-lg font-medium transition-colors">查看我的帖子</a>
                        </div>
                    </div>
                </div>
                <a href="/student/follow-list" class="text-gray-500 hover:text-indigo-600 transition-colors text-sm font-medium">关注</a>
                <div class="relative cursor-pointer flex items-center space-x-2" onclick="document.getElementById('nav-user-menu').classList.toggle('hidden')">
                    <img id="navAvatar" src="" class="h-9 w-9 rounded-full object-cover shadow-sm border border-gray-200 hidden">
                    <div id="navAvatarFallback" class="h-9 w-9 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 shadow-sm border-2 border-white flex items-center justify-center text-white font-bold text-sm">我</div>
                </div>
                <div id="nav-user-menu" class="hidden absolute right-0 top-full mt-1 w-36 bg-white rounded-xl shadow-lg py-2 border border-gray-100 z-30">
                    <a href="/student/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 font-medium">个人信息</a>
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="/" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-50 font-medium">退出登录</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8 mt-4">
    <div id="announcement-banner" class="hidden mb-6"></div>

    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-800 mb-4 mt-2">探索你的校园热爱</h1>
        <p class="text-gray-500">发现有趣的灵魂，加入志同道合的圈子</p>
    </div>

    <div class="mb-10 flex space-x-4 max-w-3xl mx-auto">
        <input type="text" id="searchInput" placeholder="搜索社群名称或简介..." class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 shadow-sm text-sm">
        <select id="categorySelect" class="border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 shadow-sm bg-white">
            <option value="">全部分类</option>
            <option value="音乐">音乐</option>
            <option value="科技">科技</option>
            <option value="摄影">摄影</option>
            <option value="游戏">游戏</option>
            <option value="体育">体育</option>
            <option value="艺术">艺术</option>
            <option value="学习">学习</option>
            <option value="生活">生活</option>
            <option value="其他">其他</option>
        </select>
        <button onclick="loadCommunities()" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 font-medium shadow-sm transition-colors">搜 索</button>
    </div>

    <div id="community-plaza" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
</main>

<div id="ann-modal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-8">
        <h3 id="ann-modal-title" class="text-lg font-bold text-gray-800 mb-3"></h3>
        <p id="ann-modal-content" class="text-gray-600 text-sm leading-relaxed whitespace-pre-wrap"></p>
        <div class="mt-6 text-right">
            <button onclick="document.getElementById('ann-modal').classList.add('hidden')" class="px-5 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">关闭</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadNavAvatar();
        loadAnnouncements();
        loadCommunities();
        loadUnreadCount();
        loadNotifCount();
        setInterval(loadNotifCount, 30000);
    });

    function loadNotifCount() {
        fetch('/api/student/notifications/count').then(r => r.json()).then(res => {
            const badge = document.getElementById('notif-badge');
            if (res.code === 200 && res.data.count > 0) {
                badge.textContent = res.data.count > 9 ? '9+' : res.data.count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }).catch(() => {});
    }

    function toggleNotifPanel() {
        const panel = document.getElementById('notif-panel');
        const isHidden = panel.classList.contains('hidden');
        panel.classList.toggle('hidden');
        if (isHidden) loadNotifList();
    }

    function loadNotifList() {
        const list = document.getElementById('notif-list');
        list.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">加载中...</p>';
        fetch('/api/student/notifications').then(r => r.json()).then(res => {
            if (res.code !== 200 || !res.data || res.data.length === 0) {
                list.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">暂无新互动</p>';
                return;
            }
            list.innerHTML = res.data.map(n => {
                const icon = n.type === 'comment' ? '💬' : '❤️';
                const detail = n.type === 'comment' ? `<p class="text-xs text-gray-500 mt-0.5 line-clamp-1">${escapeHtml(n.detail)}</p>` : '';
                const timeStr = relativeTime(n.createTime);
                return `<div class="flex items-start gap-3 px-4 py-3 hover:bg-gray-50">
                    <span class="text-lg flex-shrink-0 mt-0.5">${icon}</span>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm text-gray-800"><span class="font-medium">${escapeHtml(n.senderName)}</span> ${n.type === 'comment' ? '评论了' : '点赞了'}你的帖子</p>
                        <p class="text-xs text-indigo-500 truncate mt-0.5">《${escapeHtml(n.postPreview)}》</p>
                        ${detail}
                        <p class="text-xs text-gray-400 mt-1">${timeStr}</p>
                    </div>
                </div>`;
            }).join('');
            markAllRead();
        }).catch(() => {
            list.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">加载失败</p>';
        });
    }

    function markAllRead() {
        fetch('/api/student/notifications/read', { method: 'POST' }).then(() => {
            const badge = document.getElementById('notif-badge');
            badge.classList.add('hidden');
        }).catch(() => {});
    }

    function relativeTime(ts) {
        if (!ts) return '';
        const diff = Date.now() - new Date(ts).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 1) return '刚刚';
        if (m < 60) return `${m}分钟前`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h}小时前`;
        return `${Math.floor(h / 24)}天前`;
    }

    function loadUnreadCount() {
        fetch('/api/student/message/unread-count').then(r => r.json()).then(res => {
            if (res.code === 200 && res.data.count > 0) {
                const badge = document.getElementById('msg-badge');
                badge.textContent = res.data.count > 9 ? '9+' : res.data.count;
                badge.classList.remove('hidden');
            }
        });
    }

    function loadNavAvatar() {
        fetch('/api/student/profile').then(r => r.json()).then(res => {
            if (res.code === 200 && res.data.avatar) {
                document.getElementById('navAvatar').src = res.data.avatar;
                document.getElementById('navAvatar').classList.remove('hidden');
                document.getElementById('navAvatarFallback').classList.add('hidden');
            }
        });
    }

    function loadAnnouncements() {
        fetch('/api/student/announcements').then(r => r.json()).then(res => {
            if (res.code !== 200 || !res.data || res.data.length === 0) return;
            const banner = document.getElementById('announcement-banner');
            banner.classList.remove('hidden');
            banner.innerHTML = `
            <div class="bg-indigo-600 rounded-xl px-6 py-4 text-white">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center space-x-2">
                        <span class="text-lg">📢</span>
                        <span class="font-bold text-sm">平台公告</span>
                    </div>
                </div>
                <div class="flex flex-wrap gap-3">
                    ${res.data.map(a => {
                        const priMap = {0:'', 1:'🔴 重要 ', 2:'🚨 紧急 '};
                        const priPrefix = priMap[a.priority] || '';
                        return `
                    <button onclick="showAnnDetail('${escapeHtml(a.title)}', '${escapeHtml(a.content)}')"
                        class="bg-white/20 hover:bg-white/30 text-white text-sm px-4 py-2 rounded-lg transition-colors text-left max-w-xs truncate font-medium">
                        📌 ${priPrefix}${escapeHtml(a.title)}
                    </button>`}).join('')}
                </div>
            </div>`;
        });
    }

    function showAnnDetail(title, content) {
        document.getElementById('ann-modal-title').textContent = title;
        const el = document.getElementById('ann-modal-content');
        if (content.startsWith('&lt;') || content.startsWith('<')) {
            el.innerHTML = content;
        } else {
            el.textContent = content;
        }
        document.getElementById('ann-modal').classList.remove('hidden');
    }

    function loadCommunities() {
        const keyword = document.getElementById('searchInput').value.trim();
        const category = document.getElementById('categorySelect').value;
        let url = '/api/student/community/list?';
        if (keyword) url += `keyword=${encodeURIComponent(keyword)}&`;
        if (category) url += `category=${encodeURIComponent(category)}`;

        fetch(url).then(res => res.json()).then(res => {
            if (res.code === 200) renderCommunityCards(res.data);
            else alert(res.msg);
        });
    }

    function renderCommunityCards(communities) {
        const container = document.getElementById('community-plaza');
        if (!communities || communities.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10 bg-white rounded-xl border border-gray-100">没有找到符合条件的社群</div>';
            return;
        }
        communities.sort((a, b) => (b.isRecommended ? 1 : 0) - (a.isRecommended ? 1 : 0));

        let html = '';
        communities.forEach(item => {
            let buttonHtml = '';
            if (item.joinStatus === 1) buttonHtml = `<button onclick="window.location.href='/student/community/${item.id}'" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm shadow-sm">进入社群</button>`;
            else if (item.joinStatus === 0) buttonHtml = `<button disabled class="w-full bg-yellow-50 border border-yellow-200 text-yellow-600 font-medium py-2.5 rounded-lg text-sm cursor-not-allowed">审核中...</button>`;
            else if (item.joinStatus === 2) buttonHtml = `<button disabled class="w-full bg-red-50 border border-red-200 text-red-500 font-medium py-2.5 rounded-lg text-sm cursor-not-allowed">申请被拒</button>`;
            else buttonHtml = `<button onclick="applyJoin(${item.id})" class="w-full bg-gray-50 border border-gray-200 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 text-gray-700 font-medium py-2.5 rounded-lg transition-colors text-sm">申请加入</button>`;

            const recommendBadge = item.isRecommended ? `<div class="absolute top-3 right-3 bg-yellow-400 text-white text-xs px-2 py-0.5 rounded-full font-medium shadow-sm">⭐ 推荐</div>` : '';

            html += `
            <div class="bg-white rounded-xl shadow-sm border ${item.isRecommended ? 'border-yellow-200 ring-1 ring-yellow-200' : 'border-gray-100'} overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col relative">
                ${recommendBadge}
                <div class="h-24 bg-gradient-to-r from-indigo-100 to-purple-100 relative">
                    <div class="absolute -bottom-8 left-6 h-16 w-16 bg-white rounded-2xl p-1 shadow-md">
                        <img class="h-full w-full rounded-xl object-cover bg-gray-50" src="${item.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=default'}" alt="头像">
                    </div>
                </div>
                <div class="pt-10 px-6 pb-6 flex-1 flex flex-col">
                    <h3 class="text-lg font-bold text-gray-800 mb-1 truncate">${item.name}</h3>
                    ${item.category ? `<span class="text-xs text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md inline-block mb-2 w-max">${item.category}</span>` : ''}
                    <p class="text-gray-500 text-sm mb-6 flex-1 line-clamp-2">${item.description || '暂无简介'}</p>
                    ${buttonHtml}
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function applyJoin(communityId) {
        const fd = new URLSearchParams(); fd.append('communityId', communityId);
        fetch('/api/student/community/join', { method: 'POST', body: fd }).then(res => res.json()).then(res => {
            if (res.code === 200) { alert('✅ 申请已提交！'); loadCommunities(); }
            else alert('❌ ' + res.msg);
        });
    }

    function escapeHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
    }

    document.addEventListener('click', e => {
        const menu = document.getElementById('nav-user-menu');
        if (menu && !e.target.closest('#nav-user-menu') && !e.target.closest('[onclick*="nav-user-menu"]')) menu.classList.add('hidden');
        const notif = document.getElementById('notif-panel');
        if (notif && !e.target.closest('#notif-wrap')) notif.classList.add('hidden');
    });
</script>
</body>
</html>

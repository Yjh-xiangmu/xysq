<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>私信 - 兴趣Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pt-16">
<nav class="bg-white shadow-sm fixed w-full z-20 top-0 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex space-x-8">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 tracking-tighter">兴趣Share</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="/student/index" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">社群广场</a>
                    <a href="/student/activities" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">参与社群活动</a>
                    <a href="/student/posts" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">帖子管理</a>
                </div>
            </div>
            <div class="flex items-center space-x-5 relative">
                <div class="relative cursor-pointer flex items-center space-x-2" onclick="document.getElementById('nav-user-menu').classList.toggle('hidden')">
                    <img id="navAvatar" src="" class="h-9 w-9 rounded-full object-cover shadow-sm border border-gray-200 hidden">
                    <div id="navAvatarFallback" class="h-9 w-9 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 shadow-sm border-2 border-white flex items-center justify-center text-white font-bold text-sm">我</div>
                </div>
                <div id="nav-user-menu" class="hidden absolute right-0 top-full mt-1 w-36 bg-white rounded-xl shadow-lg py-2 border border-gray-100 z-30">
                    <a href="/student/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 font-medium">个人信息</a>
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="/" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-50 font-medium">退出登录</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-6 mt-4 flex gap-4 h-[calc(100vh-5rem)]">
    <!-- 会话列表 -->
    <div class="w-72 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden flex-shrink-0">
        <div class="px-4 py-3 border-b border-gray-100 bg-gray-50">
            <h3 class="font-bold text-gray-700 text-sm">私信</h3>
        </div>
        <div id="conversation-list" class="flex-1 overflow-y-auto divide-y divide-gray-50">
            <div class="py-8 text-center text-sm text-gray-400">加载中...</div>
        </div>
    </div>

    <!-- 聊天区 -->
    <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
        <div id="chat-header" class="px-5 py-3 border-b border-gray-100 bg-gray-50 hidden">
            <span id="chat-with-name" class="font-semibold text-gray-800 text-sm"></span>
        </div>
        <div id="chat-empty" class="flex-1 flex items-center justify-center text-gray-400 text-sm">选择一个会话开始聊天</div>
        <div id="chat-messages" class="hidden flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div id="chat-input-area" class="hidden border-t border-gray-100 p-3">
            <div class="flex items-end space-x-2">
                <div class="flex-1">
                    <textarea id="msg-input" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 resize-none" placeholder="发送消息（需互相关注才能私信）..."></textarea>
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="cursor-pointer text-gray-400 hover:text-indigo-600 transition-colors" title="发送图片">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <input type="file" id="msg-image-input" accept="image/*" class="hidden" onchange="handleMsgImage(event)">
                    </label>
                    <button onclick="sendMsg()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">发送</button>
                </div>
            </div>
            <div id="msg-image-preview" class="hidden mt-2 relative inline-block">
                <img id="msg-img-thumb" src="" class="max-h-20 rounded-lg border border-gray-200">
                <button onclick="clearMsgImage()" class="absolute -top-1 -right-1 h-5 w-5 rounded-full bg-red-500 text-white text-xs flex items-center justify-center">×</button>
            </div>
        </div>
    </div>
</main>

<script>
    let myId = null;
    let currentWithId = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadNavAvatar();
        fetch('/api/student/profile').then(r => r.json()).then(res => {
            if (res.code === 200) {
                // get my id
                fetch('/api/student/follow/list').then(r2 => r2.json()); // just to warm session
            }
        });
        loadConversations();

        // 从URL参数自动打开会话
        const params = new URLSearchParams(window.location.search);
        const withId = params.get('with');
        if (withId) setTimeout(() => openChat(parseInt(withId)), 500);
    });

    function loadNavAvatar() {
        fetch('/api/student/profile').then(r => r.json()).then(res => {
            if (res.code === 200 && res.data.avatar) {
                document.getElementById('navAvatar').src = res.data.avatar;
                document.getElementById('navAvatar').classList.remove('hidden');
                document.getElementById('navAvatarFallback').classList.add('hidden');
            }
        });
    }

    function loadConversations() {
        fetch('/api/student/message/conversations').then(r => r.json()).then(res => {
            const container = document.getElementById('conversation-list');
            if (res.code !== 200 || !res.data || res.data.length === 0) {
                container.innerHTML = '<div class="py-8 text-center text-sm text-gray-400">暂无私信记录</div>';
                return;
            }
            container.innerHTML = res.data.map(c => `
                <div onclick="openChat(${c.studentId})" class="flex items-center space-x-3 p-3 hover:bg-indigo-50 cursor-pointer transition-colors" id="conv-${c.studentId}">
                    ${c.avatar ? `<img src="${c.avatar}" class="h-10 w-10 rounded-full object-cover flex-shrink-0">` : `<div class="h-10 w-10 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">${(c.nickname||'?').charAt(0)}</div>`}
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-semibold text-gray-800 truncate">${escapeHtml(c.nickname||'用户')}</span>
                            ${c.unreadCount > 0 ? `<span class="bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 ml-1 flex-shrink-0">${c.unreadCount}</span>` : ''}
                        </div>
                        <p class="text-xs text-gray-400 truncate">${escapeHtml(c.lastContent||'')}</p>
                    </div>
                </div>`).join('');
        });
    }

    function openChat(withId) {
        currentWithId = withId;
        // 高亮选中
        document.querySelectorAll('[id^="conv-"]').forEach(el => el.classList.remove('bg-indigo-50'));
        const convEl = document.getElementById(`conv-${withId}`);
        if (convEl) convEl.classList.add('bg-indigo-100');

        document.getElementById('chat-empty').classList.add('hidden');
        document.getElementById('chat-messages').classList.remove('hidden');
        document.getElementById('chat-input-area').classList.remove('hidden');
        document.getElementById('chat-header').classList.remove('hidden');

        fetch(`/api/student/message/history?withId=${withId}`).then(r => r.json()).then(res => {
            if (res.code === 200) {
                renderMessages(res.data);
                // 获取对方名字
                fetch(`/api/student/user/${withId}/profile`).then(r2 => r2.json()).then(res2 => {
                    if (res2.code === 200) document.getElementById('chat-with-name').textContent = res2.data.nickname || '用户';
                });
            }
        });
    }

    function renderMessages(messages) {
        const container = document.getElementById('chat-messages');
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="text-center text-gray-400 text-sm py-8">暂无消息，发送第一条消息吧</div>';
            return;
        }
        container.innerHTML = messages.map(m => {
            const isMe = m.isMine;
            const time = formatTime(m.createTime);
            let body = '';
            if (m.content) body += `<p class="text-sm leading-relaxed break-words">${escapeHtml(m.content)}</p>`;
            if (m.imageUrl) body += `<img src="${m.imageUrl}" class="max-h-48 rounded-lg mt-1 cursor-zoom-in" onclick="window.open(this.src)">`;
            return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                <div class="max-w-xs lg:max-w-md ${isMe ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-800'} rounded-2xl px-4 py-2.5 shadow-sm">
                    ${body}
                    <p class="text-xs mt-1 ${isMe ? 'text-indigo-200' : 'text-gray-400'} text-right">${time}</p>
                </div>
            </div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    let pendingMsgImage = null;
    function handleMsgImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        pendingMsgImage = file;
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('msg-img-thumb').src = ev.target.result;
            document.getElementById('msg-image-preview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }
    function clearMsgImage() {
        pendingMsgImage = null;
        document.getElementById('msg-image-preview').classList.add('hidden');
        document.getElementById('msg-image-input').value = '';
    }

    function sendMsg() {
        if (!currentWithId) return;
        const content = document.getElementById('msg-input').value.trim();
        if (!content && !pendingMsgImage) return alert('请输入消息内容或选择图片');

        const fd = new FormData();
        fd.append('toStudentId', currentWithId);
        if (content) fd.append('content', content);
        if (pendingMsgImage) fd.append('image', pendingMsgImage);

        fetch('/api/student/message/send', { method: 'POST', body: fd }).then(r => r.json()).then(res => {
            if (res.code === 200) {
                document.getElementById('msg-input').value = '';
                clearMsgImage();
                openChat(currentWithId);
                loadConversations();
            } else alert(res.msg);
        });
    }

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') sendMsg();
    });

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const date = new Date(timeStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        return `${date.getMonth()+1}-${date.getDate()}`;
    }
    function escapeHtml(str) {
        return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.addEventListener('click', e => {
        const menu = document.getElementById('nav-user-menu');
        if (menu && !e.target.closest('#nav-user-menu') && !e.target.closest('[onclick*="nav-user-menu"]')) {
            menu.classList.add('hidden');
        }
    });
</script>
</body>
</html>

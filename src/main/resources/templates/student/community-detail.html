<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社群动态 - 兴趣Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pt-16">
<nav class="bg-white shadow-sm fixed w-full z-20 top-0 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center space-x-4">
                <a href="/student/index" class="text-gray-500 hover:text-indigo-600 font-medium transition-colors">← 返回广场</a>
                <span class="text-xl font-bold border-l-2 pl-4 border-gray-300 text-gray-800">社群互动区</span>
            </div>
            <div class="flex items-center space-x-3">
                <a href="/student/profile" class="text-sm text-gray-500 hover:text-indigo-600 transition-colors">个人信息</a>
                <a href="/" class="text-sm text-gray-500 hover:text-red-500 transition-colors">退出</a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-6">
    <input type="hidden" id="currentCommunityId" th:value="${communityId}">
    <input type="hidden" id="currentStudentId" th:value="${currentStudentId}">

    <!-- 左侧：帖子 -->
    <div class="flex-1 min-w-0">
        <!-- 发帖框 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <textarea id="postContent" rows="3" class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none transition-colors" placeholder="有什么新鲜事想和大家分享？"></textarea>
            <div class="flex justify-end mt-4">
                <button onclick="publishPost()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">发 布</button>
            </div>
        </div>

        <div class="space-y-5" id="post-list-container">
            <div class="text-center text-gray-400 py-10">正在加载动态...</div>
        </div>
    </div>

    <!-- 右侧：活动 -->
    <aside class="w-full md:w-80 flex-shrink-0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden sticky top-20">
            <div class="bg-indigo-50 px-5 py-4 border-b border-indigo-100">
                <h3 class="font-bold text-indigo-900 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    近期活动
                </h3>
            </div>
            <div class="p-5 space-y-4" id="activity-list-container">
                <div class="text-center text-sm text-gray-400">正在加载活动...</div>
            </div>
        </div>
    </aside>
</main>

<!-- 编辑帖子 Modal -->
<div id="edit-post-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-6">
        <h3 class="font-bold text-gray-800 text-lg mb-4">编辑动态</h3>
        <textarea id="edit-post-content" rows="5" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none text-sm"></textarea>
        <div class="flex justify-end space-x-3 mt-4">
            <button onclick="closeEditPost()" class="px-5 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium transition-colors">取消</button>
            <button onclick="saveEditPost()" class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium transition-colors">保存修改</button>
        </div>
    </div>
</div>

<script>
    const communityId = document.getElementById('currentCommunityId').value;
    const currentStudentId = parseInt(document.getElementById('currentStudentId').value) || 0;
    let replyTargets = {};
    let editingPostId = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadPosts();
        loadActivities();
    });

    // ===== 相对时间 =====
    function formatTime(timeStr) {
        if (!timeStr) return '';
        const date = new Date(timeStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        if (diff < 86400 * 2) return '昨天';
        if (diff < 86400 * 7) return Math.floor(diff / 86400) + '天前';
        return `${date.getMonth() + 1}-${date.getDate()}`;
    }

    // ===== 发帖 =====
    function publishPost() {
        const content = document.getElementById('postContent').value.trim();
        if (!content) return alert('写点什么再发布吧！');
        const formData = new URLSearchParams();
        formData.append('communityId', communityId);
        formData.append('content', content);
        fetch('/api/student/post/publish', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) { document.getElementById('postContent').value = ''; loadPosts(); }
                else alert('❌ ' + res.msg);
            });
    }

    // ===== 加载帖子 =====
    function loadPosts() {
        fetch(`/api/student/post/list?communityId=${communityId}`)
            .then(r => r.json())
            .then(res => { if (res.code === 200) renderPosts(res.data); });
    }

    function renderPosts(posts) {
        const container = document.getElementById('post-list-container');
        if (!posts || posts.length === 0) {
            container.innerHTML = '<div class="text-center text-gray-400 bg-white rounded-xl p-10 border border-gray-200">社群里还没有动态，快来抢个沙发吧！</div>';
            return;
        }
        container.innerHTML = posts.map(post => renderPostCard(post)).join('');
    }

    function renderPostCard(post) {
        const avatar = `<div class="h-10 w-10 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center text-white font-bold text-sm shadow-sm flex-shrink-0">${post.authorName.charAt(0)}</div>`;
        const likedClass = post.isLiked ? 'text-red-500' : 'text-gray-400 hover:text-red-400';
        const heartFill = post.isLiked ? 'fill-current' : 'none';

        let commentsHtml = '';
        if (post.comments && post.comments.length > 0) {
            commentsHtml = `<div class="mt-4 bg-gray-50 rounded-xl border border-gray-100 divide-y divide-gray-100 overflow-hidden">`;
            post.comments.forEach(root => {
                commentsHtml += `
                <div class="px-4 py-3">
                    <div class="flex items-start space-x-2 group cursor-pointer" onclick="prepareReply(${post.id}, ${root.id}, ${root.studentId}, '${escapeHtml(root.authorName)}')">
                        <div class="h-7 w-7 rounded-full bg-gradient-to-tr from-purple-400 to-pink-500 flex items-center justify-center text-white text-xs font-bold flex-shrink-0 mt-0.5">${root.authorName.charAt(0)}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-baseline space-x-2">
                                <span class="text-sm font-semibold text-gray-800">${escapeHtml(root.authorName)}</span>
                                <span class="text-xs text-gray-400">${formatTime(root.createTime)}</span>
                                <span class="text-xs text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">回复</span>
                            </div>
                            <p class="text-sm text-gray-700 mt-0.5 leading-relaxed">${escapeHtml(root.content)}</p>
                        </div>
                    </div>`;
                if (root.replies && root.replies.length > 0) {
                    commentsHtml += `<div class="ml-9 mt-2 space-y-2 border-l-2 border-indigo-100 pl-3">`;
                    root.replies.forEach(reply => {
                        commentsHtml += `
                        <div class="flex items-start space-x-2 group cursor-pointer" onclick="prepareReply(${post.id}, ${root.id}, ${reply.studentId}, '${escapeHtml(reply.authorName)}')">
                            <div class="h-6 w-6 rounded-full bg-gradient-to-tr from-yellow-400 to-orange-400 flex items-center justify-center text-white text-xs font-bold flex-shrink-0 mt-0.5">${reply.authorName.charAt(0)}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline space-x-1">
                                    <span class="text-sm font-semibold text-gray-800">${escapeHtml(reply.authorName)}</span>
                                    <span class="text-xs text-gray-400">回复</span>
                                    <span class="text-sm font-semibold text-indigo-600">@${escapeHtml(reply.replyToName)}</span>
                                    <span class="text-xs text-gray-400 ml-1">${formatTime(reply.createTime)}</span>
                                    <span class="text-xs text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">回复</span>
                                </div>
                                <p class="text-sm text-gray-700 mt-0.5 leading-relaxed">${escapeHtml(reply.content)}</p>
                            </div>
                        </div>`;
                    });
                    commentsHtml += `</div>`;
                }
                commentsHtml += `</div>`;
            });
            commentsHtml += `</div>`;
        }

        return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
            <div class="flex items-center space-x-3 mb-3">
                ${avatar}
                <div>
                    <h4 class="font-bold text-gray-800 text-sm">${escapeHtml(post.authorName)}</h4>
                    <p class="text-xs text-gray-400">${formatTime(post.createTime)}</p>
                </div>
            </div>
            <p class="text-gray-800 leading-relaxed whitespace-pre-wrap mb-4 text-[15px]">${escapeHtml(post.content)}</p>

            <div class="flex items-center space-x-5 text-sm border-t border-gray-100 pt-3">
                <!-- 点赞 -->
                <button id="like-btn-${post.id}" onclick="toggleLike(${post.id})" class="flex items-center space-x-1.5 transition-colors ${likedClass}">
                    <svg class="w-5 h-5" fill="${heartFill}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                    </svg>
                    <span id="like-count-${post.id}">${post.likeCount}</span>
                </button>
                <!-- 评论 -->
                <button onclick="toggleCommentBox(${post.id})" class="flex items-center space-x-1.5 text-gray-400 hover:text-indigo-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <span>${post.commentCount} 条评论</span>
                </button>
                <!-- 自己的帖子：编辑/删除 -->
                ${post.studentId === currentStudentId ? `
                <div class="ml-auto flex items-center space-x-2">
                    <button onclick="openEditPost(${post.id}, \`${escapeHtml(post.content).replace(/`/g,'\\`')}\`)" class="text-xs text-gray-400 hover:text-indigo-500 transition-colors">编辑</button>
                    <button onclick="deleteMyPost(${post.id})" class="text-xs text-gray-400 hover:text-red-500 transition-colors">删除</button>
                </div>` : ''}
            </div>

            ${commentsHtml}

            <!-- 评论输入框 -->
            <div id="comment-box-${post.id}" class="hidden mt-3 flex items-center space-x-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 focus-within:border-indigo-400 focus-within:ring-1 focus-within:ring-indigo-300 transition-all">
                <span id="reply-badge-${post.id}" class="hidden bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full text-xs font-medium whitespace-nowrap cursor-pointer hover:bg-red-100 hover:text-red-500 transition-colors" onclick="resetReply(${post.id})"></span>
                <input type="text" id="comment-input-${post.id}" class="flex-1 bg-transparent border-none py-1 focus:ring-0 text-sm text-gray-700 placeholder-gray-400" placeholder="说说你的想法...">
                <button onclick="submitComment(${post.id})" class="bg-indigo-600 text-white hover:bg-indigo-700 px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex-shrink-0">发送</button>
            </div>
        </div>`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== 点赞 =====
    function toggleLike(postId) {
        const formData = new URLSearchParams();
        formData.append('postId', postId);
        fetch('/api/student/post/like', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    const btn = document.getElementById(`like-btn-${postId}`);
                    const cnt = document.getElementById(`like-count-${postId}`);
                    const svg = btn.querySelector('svg');
                    cnt.textContent = res.data.likeCount;
                    if (res.data.isLiked) {
                        btn.className = btn.className.replace('text-gray-400 hover:text-red-400', 'text-red-500');
                        svg.setAttribute('fill', 'currentColor');
                    } else {
                        btn.className = btn.className.replace('text-red-500', 'text-gray-400 hover:text-red-400');
                        svg.setAttribute('fill', 'none');
                    }
                }
            });
    }

    // ===== 评论框 =====
    function toggleCommentBox(postId) {
        const box = document.getElementById(`comment-box-${postId}`);
        box.classList.toggle('hidden');
        if (!box.classList.contains('hidden')) {
            resetReply(postId);
            document.getElementById(`comment-input-${postId}`).focus();
        }
    }

    function prepareReply(postId, parentId, targetStudentId, targetName) {
        replyTargets[postId] = { parentId, replyToStudentId: targetStudentId };
        const box = document.getElementById(`comment-box-${postId}`);
        box.classList.remove('hidden');
        const badge = document.getElementById(`reply-badge-${postId}`);
        badge.innerText = `回复 @${targetName}  ×`;
        badge.classList.remove('hidden');
        document.getElementById(`comment-input-${postId}`).focus();
    }

    function resetReply(postId) {
        delete replyTargets[postId];
        const badge = document.getElementById(`reply-badge-${postId}`);
        if (badge) badge.classList.add('hidden');
    }

    function submitComment(postId) {
        const content = document.getElementById(`comment-input-${postId}`).value.trim();
        if (!content) return alert('评论内容不能为空');
        const formData = new URLSearchParams();
        formData.append('postId', postId);
        formData.append('content', content);
        if (replyTargets[postId]) {
            formData.append('parentId', replyTargets[postId].parentId);
            formData.append('replyToStudentId', replyTargets[postId].replyToStudentId);
        } else {
            formData.append('parentId', 0);
        }
        fetch('/api/student/post/comment', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    document.getElementById(`comment-input-${postId}`).value = '';
                    resetReply(postId);
                    loadPosts();
                } else alert('❌ ' + res.msg);
            });
    }

    // ===== 活动 =====
    function loadActivities() {
        fetch(`/api/student/activity/list?communityId=${communityId}`)
            .then(r => r.json())
            .then(res => { if (res.code === 200) renderActivities(res.data); });
    }

    function renderActivities(activities) {
        const container = document.getElementById('activity-list-container');
        if (!activities || activities.length === 0) {
            container.innerHTML = '<div class="text-center text-sm text-gray-400 py-4">暂无活动发布</div>';
            return;
        }
        container.innerHTML = activities.map(act => {
            const btnHtml = act.isSigned
                ? `<button disabled class="w-full bg-gray-100 text-gray-500 py-2 rounded-lg text-sm font-medium cursor-not-allowed">✓ 已报名</button>`
                : `<button onclick="signActivity(${act.id})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">立即报名</button>`;
            return `
            <div class="border border-gray-100 rounded-xl p-4 hover:shadow-sm transition-shadow bg-gray-50">
                <h4 class="font-bold text-gray-800 text-sm mb-2">${escapeHtml(act.title)}</h4>
                <p class="text-xs text-gray-500 mb-1">🕒 ${formatTime(act.eventTime)}</p>
                <p class="text-xs text-gray-500 mb-3">📍 ${escapeHtml(act.location)}</p>
                <p class="text-xs text-gray-600 mb-3 line-clamp-2">${escapeHtml(act.content)}</p>
                <div class="text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded-full inline-block mb-3">已报名 ${act.signCount} 人</div>
                <div>${btnHtml}</div>
            </div>`;
        }).join('');
    }

    // ===== 编辑帖子 =====
    function openEditPost(postId, currentContent) {
        editingPostId = postId;
        const modal = document.getElementById('edit-post-modal');
        document.getElementById('edit-post-content').value = currentContent;
        modal.classList.remove('hidden');
        document.getElementById('edit-post-content').focus();
    }

    function closeEditPost() {
        editingPostId = null;
        document.getElementById('edit-post-modal').classList.add('hidden');
    }

    function saveEditPost() {
        if (!editingPostId) return;
        const content = document.getElementById('edit-post-content').value.trim();
        if (!content) return alert('内容不能为空');
        const formData = new URLSearchParams();
        formData.append('postId', editingPostId);
        formData.append('content', content);
        fetch('/api/student/post/update', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) { closeEditPost(); loadPosts(); }
                else alert('❌ ' + res.msg);
            });
    }

    // ===== 删除帖子 =====
    function deleteMyPost(postId) {
        if (!confirm('确定要删除这条动态吗？相关评论也会一并删除。')) return;
        const formData = new URLSearchParams();
        formData.append('postId', postId);
        fetch('/api/student/post/delete', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) loadPosts();
                else alert('❌ ' + res.msg);
            });
    }

    function signActivity(activityId) {
        const formData = new URLSearchParams();
        formData.append('activityId', activityId);
        fetch('/api/student/activity/sign', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) { alert('报名成功！'); loadActivities(); }
                else alert(res.msg);
            });
    }
</script>
</body>
</html>

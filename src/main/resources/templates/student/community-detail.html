<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社群动态 - 兴趣Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pt-16">
<nav class="bg-white shadow-sm fixed w-full z-20 top-0 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex space-x-8">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 tracking-tighter">兴趣Share</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center border-l-2 border-gray-200 ml-6 pl-6">
                    <a href="/student/index" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">← 返回广场</a>
                    <button onclick="showCommunityInfo()" class="text-indigo-600 hover:text-indigo-700 font-medium transition px-1 py-2">社群信息</button>
                    <button onclick="showSearchModal()" class="text-gray-500 hover:text-indigo-600 font-medium transition px-1 py-2">搜索</button>
                    <button onclick="quitCommunity()" class="text-red-500 hover:text-red-600 font-medium transition px-1 py-2 ml-4">退出本群</button>
                </div>
            </div>
            <div class="flex items-center space-x-5 relative">
                <div class="relative cursor-pointer flex items-center space-x-2" onclick="document.getElementById('nav-user-menu').classList.toggle('hidden')">
                    <img id="navAvatar" src="" class="h-9 w-9 rounded-full object-cover shadow-sm border border-gray-200 hidden">
                    <div id="navAvatarFallback" class="h-9 w-9 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 shadow-sm border-2 border-white flex items-center justify-center text-white font-bold text-sm">我</div>
                </div>
                <div id="nav-user-menu" class="hidden absolute right-0 top-full mt-1 w-36 bg-white rounded-xl shadow-lg py-2 border border-gray-100 z-30">
                    <a href="/student/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 font-medium">个人信息</a>
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="/" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-50 font-medium">退出登录</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-6">
    <input type="hidden" id="currentCommunityId" th:value="${communityId}">
    <input type="hidden" id="currentStudentId" th:value="${currentStudentId}">

    <div class="flex-1 min-w-0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-6">
            <textarea id="postContent" rows="3" class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none transition-colors" placeholder="有什么新鲜事想和大家分享？" oninput="saveDraft()"></textarea>

            <div id="image-preview-wrap" class="hidden mt-3 relative inline-block">
                <img id="image-preview" src="" class="max-h-48 rounded-lg border border-gray-200 object-cover">
                <button onclick="clearPostImage()" class="absolute -top-2 -right-2 h-6 w-6 rounded-full bg-red-500 text-white text-xs flex items-center justify-center hover:bg-red-600 shadow">×</button>
            </div>

            <div class="flex items-center space-x-4 mt-3">
                <label class="cursor-pointer flex items-center gap-2 text-sm text-gray-500 hover:text-indigo-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    添加图片
                    <input type="file" id="postImageInput" accept="image/*" class="hidden" onchange="handlePostImage(event)">
                </label>
                <div class="flex items-center gap-1.5 text-sm text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <input type="datetime-local" id="scheduledTime" class="border border-gray-200 rounded-lg px-2 py-1 text-xs focus:outline-none focus:border-indigo-400 text-gray-600" title="定时发布（留空立即发布）">
                    <span class="text-xs text-gray-400">定时发布（留空立即）</span>
                </div>
                <span id="draft-saved" class="text-xs text-gray-400 hidden">已自动保存草稿</span>
            </div>

            <div class="flex items-center justify-end mt-4">
                <button onclick="publishPost()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">发 布</button>
            </div>
        </div>

        <div class="space-y-5" id="post-list-container">
            <div class="text-center text-gray-400 py-10">正在加载动态...</div>
        </div>
    </div>

    <aside class="w-full md:w-80 flex-shrink-0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden sticky top-20">
            <div class="bg-indigo-50 px-5 py-4 border-b border-indigo-100">
                <h3 class="font-bold text-indigo-900 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    近期活动
                </h3>
            </div>
            <div class="p-5 space-y-4" id="activity-list-container">
                <div class="text-center text-sm text-gray-400">正在加载活动...</div>
            </div>
        </div>
    </aside>
</main>

<div id="edit-post-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-6">
        <h3 class="font-bold text-gray-800 text-lg mb-4">编辑动态</h3>
        <textarea id="edit-post-content" rows="5" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none text-sm"></textarea>
        <div class="flex justify-end space-x-3 mt-4">
            <button onclick="closeEditPost()" class="px-5 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium">取消</button>
            <button onclick="saveEditPost()" class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium">保存修改</button>
        </div>
    </div>
</div>

<div id="user-card-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 overflow-hidden relative">
        <button onclick="closeUserCard()" class="absolute top-4 right-4 text-white hover:text-gray-200 z-10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 h-28"></div>
        <div class="px-6 pb-8 relative">
            <div class="flex justify-center -mt-12 mb-4">
                <div id="card-avatar-wrap" class="h-24 w-24 rounded-full border-4 border-white shadow-md bg-white flex items-center justify-center text-3xl font-bold text-gray-400 overflow-hidden cursor-default"></div>
            </div>
            <div class="text-center">
                <h3 id="card-nickname" class="text-xl font-bold text-gray-800">加载中...</h3>
                <p id="card-intro" class="text-sm text-gray-500 mt-1 px-4">暂无简介</p>
            </div>
            <div class="flex justify-center space-x-8 mt-4 mb-4">
                <div class="text-center"><div id="card-likes" class="text-lg font-bold text-gray-800">-</div><div class="text-xs text-gray-400">获赞</div></div>
                <div class="text-center"><div id="card-follows" class="text-lg font-bold text-gray-800">-</div><div class="text-xs text-gray-400">关注</div></div>
            </div>
            <div class="flex space-x-3 mb-4">
                <button id="card-follow-btn" onclick="" class="flex-1 py-2 rounded-lg text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700 transition-colors">+ 关注</button>
                <button id="card-msg-btn" onclick="" class="flex-1 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">私信</button>
            </div>
            <div class="space-y-2">
                <div class="flex items-center text-sm text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="mr-3 text-lg">📱</span> <span id="card-phone" class="font-medium">保密</span>
                </div>
                <div class="flex items-center text-sm text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="mr-3 text-lg">✉️</span> <span id="card-email" class="font-medium">保密</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const communityId = document.getElementById('currentCommunityId').value;
    const currentStudentId = parseInt(document.getElementById('currentStudentId').value) || 0;
    let replyTargets = {};
    let editingPostId = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadNavAvatar();
        loadPosts();
        loadActivities();
        const draft = localStorage.getItem(`post_draft_${communityId}`);
        if (draft) { document.getElementById('postContent').value = draft; }
    });

    function loadNavAvatar() {
        fetch('/api/student/profile').then(r => r.json()).then(res => {
            if (res.code === 200 && res.data.avatar) {
                document.getElementById('navAvatar').src = res.data.avatar;
                document.getElementById('navAvatar').classList.remove('hidden');
                document.getElementById('navAvatarFallback').classList.add('hidden');
            }
        });
    }

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const date = new Date(timeStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        if (diff < 86400 * 2) return '昨天';
        if (diff < 86400 * 7) return Math.floor(diff / 86400) + '天前';
        return `${date.getMonth() + 1}-${date.getDate()}`;
    }

    function handlePostImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 3 * 1024 * 1024) { alert('图片不能超过3MB'); return; }
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('image-preview').src = e.target.result;
            document.getElementById('image-preview-wrap').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }

    function clearPostImage() {
        document.getElementById('image-preview-wrap').classList.add('hidden');
        document.getElementById('image-preview').src = '';
        document.getElementById('postImageInput').value = '';
    }

    let draftTimer = null;
    function saveDraft() {
        clearTimeout(draftTimer);
        draftTimer = setTimeout(() => {
            const content = document.getElementById('postContent').value;
            if (content.trim()) {
                localStorage.setItem(`post_draft_${communityId}`, content);
                const hint = document.getElementById('draft-saved');
                hint.classList.remove('hidden');
                setTimeout(() => hint.classList.add('hidden'), 2000);
            } else {
                localStorage.removeItem(`post_draft_${communityId}`);
            }
        }, 800);
    }

    function publishPost() {
        const content = document.getElementById('postContent').value.trim();
        if (!content) return alert('写点什么再发布吧！');

        const fd = new FormData();
        fd.append('communityId', communityId);
        fd.append('content', content);

        const scheduledTime = document.getElementById('scheduledTime').value;
        if (scheduledTime) fd.append('scheduledTime', scheduledTime);

        const fileInput = document.getElementById('postImageInput');
        if (fileInput.files.length > 0) {
            fd.append('image', fileInput.files[0]);
        }

        fetch('/api/student/post/publish', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    document.getElementById('postContent').value = '';
                    document.getElementById('scheduledTime').value = '';
                    localStorage.removeItem(`post_draft_${communityId}`);
                    clearPostImage();
                    loadPosts();
                } else alert('❌ ' + res.msg);
            });
    }

    function loadPosts() {
        fetch(`/api/student/post/list?communityId=${communityId}`)
            .then(r => r.json())
            .then(res => { if (res.code === 200) renderPosts(res.data); });
    }

    // 辅助生成头像HTML，点击均可弹出名片
    function genAvatarHtml(url, name, studentId, sizeClass) {
        if (url) {
            return `<img src="${url}" onclick="showUserCard(${studentId}); event.stopPropagation();" class="${sizeClass} rounded-full object-cover shadow-sm border border-gray-100 flex-shrink-0 cursor-pointer hover:ring-2 hover:ring-indigo-300 transition-all mt-0.5">`;
        }
        return `<div onclick="showUserCard(${studentId}); event.stopPropagation();" class="${sizeClass} rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center text-white font-bold text-xs shadow-sm flex-shrink-0 cursor-pointer hover:ring-2 hover:ring-indigo-300 transition-all mt-0.5">${(name || '?').charAt(0)}</div>`;
    }

    function renderPosts(posts) {
        const container = document.getElementById('post-list-container');
        if (!posts || posts.length === 0) {
            container.innerHTML = '<div class="text-center text-gray-400 bg-white rounded-xl p-10 border border-gray-200">社群里还没有动态，快来抢个沙发吧！</div>';
            return;
        }
        container.innerHTML = posts.map(post => renderPostCard(post)).join('');
    }

    function renderPostCard(post) {
        const avatar = genAvatarHtml(post.authorAvatar, post.authorName, post.studentId, 'h-10 w-10 text-sm');
        const likedClass = post.isLiked ? 'text-red-500' : 'text-gray-400 hover:text-red-400';
        const heartFill = post.isLiked ? 'fill-current' : 'none';

        const imageHtml = post.imageUrl
            ? `<img src="${post.imageUrl}" class="mt-3 max-h-64 rounded-xl object-cover border border-gray-100 w-full cursor-zoom-in" onclick="window.open(this.src)">`
            : '';

        let commentsHtml = '';
        if (post.comments && post.comments.length > 0) {
            commentsHtml = `<div class="mt-4 bg-gray-50 rounded-xl border border-gray-100 divide-y divide-gray-100 overflow-hidden">`;
            post.comments.forEach(root => {
                const rootAvatar = genAvatarHtml(root.authorAvatar, root.authorName, root.studentId, 'h-7 w-7');
                commentsHtml += `
                <div class="px-4 py-3">
                    <div class="flex items-start space-x-2 group cursor-pointer" onclick="prepareReply(${post.id}, ${root.id}, ${root.studentId}, '${escapeHtml(root.authorName)}')">
                        ${rootAvatar}
                        <div class="flex-1 min-w-0">
                            <div class="flex items-baseline space-x-2">
                                <span class="text-sm font-semibold text-gray-800">${escapeHtml(root.authorName)}</span>
                                <span class="text-xs text-gray-400">${formatTime(root.createTime)}</span>
                                <span class="text-xs text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">回复</span>
                            </div>
                            <p class="text-sm text-gray-700 mt-0.5 leading-relaxed">${escapeHtml(root.content)}</p>
                        </div>
                    </div>`;
                if (root.replies && root.replies.length > 0) {
                    commentsHtml += `<div class="ml-9 mt-2 space-y-2 border-l-2 border-indigo-100 pl-3">`;
                    root.replies.forEach(reply => {
                        const replyAvatar = genAvatarHtml(reply.authorAvatar, reply.authorName, reply.studentId, 'h-6 w-6');
                        commentsHtml += `
                        <div class="flex items-start space-x-2 group cursor-pointer" onclick="prepareReply(${post.id}, ${root.id}, ${reply.studentId}, '${escapeHtml(reply.authorName)}')">
                            ${replyAvatar}
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline space-x-1">
                                    <span class="text-sm font-semibold text-gray-800">${escapeHtml(reply.authorName)}</span>
                                    <span class="text-xs text-gray-400">回复</span>
                                    <span class="text-sm font-semibold text-indigo-600">@${escapeHtml(reply.replyToName)}</span>
                                    <span class="text-xs text-gray-400 ml-1">${formatTime(reply.createTime)}</span>
                                    <span class="text-xs text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">回复</span>
                                </div>
                                <p class="text-sm text-gray-700 mt-0.5 leading-relaxed">${escapeHtml(reply.content)}</p>
                            </div>
                        </div>`;
                    });
                    commentsHtml += `</div>`;
                }
                commentsHtml += `</div>`;
            });
            commentsHtml += `</div>`;
        }

        return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
            <div class="flex items-center space-x-3 mb-3">
                ${avatar}
                <div>
                    <h4 class="font-bold text-gray-800 text-sm cursor-pointer hover:underline" onclick="showUserCard(${post.studentId})">${escapeHtml(post.authorName)}</h4>
                    <p class="text-xs text-gray-400">${formatTime(post.createTime)}</p>
                </div>
            </div>
            <p class="text-gray-800 leading-relaxed whitespace-pre-wrap text-[15px]">${escapeHtml(post.content)}</p>
            ${imageHtml}
            <div class="flex items-center space-x-5 text-sm border-t border-gray-100 pt-3 mt-4">
                <button id="like-btn-${post.id}" onclick="toggleLike(${post.id})" class="flex items-center space-x-1.5 transition-colors ${likedClass}">
                    <svg class="w-5 h-5" fill="${heartFill}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                    </svg>
                    <span id="like-count-${post.id}">${post.likeCount}</span>
                </button>
                <button onclick="toggleCommentBox(${post.id})" class="flex items-center space-x-1.5 text-gray-400 hover:text-indigo-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <span>${post.commentCount} 条评论</span>
                </button>
                ${post.studentId === currentStudentId ? `
                <div class="ml-auto flex items-center space-x-2">
                    <button onclick="openEditPost(${post.id}, \`${escapeHtml(post.content).replace(/`/g,'\\`')}\`)" class="text-xs text-gray-400 hover:text-indigo-500 transition-colors">编辑</button>
                    <button onclick="deleteMyPost(${post.id})" class="text-xs text-gray-400 hover:text-red-500 transition-colors">删除</button>
                </div>` : ''}
            </div>
            ${commentsHtml}
            <div id="comment-box-${post.id}" class="hidden mt-3 flex items-center space-x-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 focus-within:border-indigo-400 transition-all">
                <span id="reply-badge-${post.id}" class="hidden bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full text-xs font-medium whitespace-nowrap cursor-pointer hover:bg-red-100 hover:text-red-500 transition-colors" onclick="resetReply(${post.id})"></span>
                <input type="text" id="comment-input-${post.id}" class="flex-1 bg-transparent border-none py-1 focus:ring-0 text-sm text-gray-700 placeholder-gray-400" placeholder="说说你的想法...">
                <button onclick="submitComment(${post.id})" class="bg-indigo-600 text-white hover:bg-indigo-700 px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex-shrink-0">发送</button>
            </div>
        </div>`;
    }

    // 个性化名片逻辑
    let cardStudentId = null;
    function showUserCard(studentId) {
        if (studentId === currentStudentId) return;
        cardStudentId = studentId;
        document.getElementById('user-card-modal').classList.remove('hidden');
        document.getElementById('card-nickname').textContent = '加载中...';
        document.getElementById('card-intro').textContent = '...';
        document.getElementById('card-phone').textContent = '...';
        document.getElementById('card-email').textContent = '...';
        document.getElementById('card-avatar-wrap').innerHTML = '';

        fetch(`/api/student/user/${studentId}/profile`)
            .then(r => r.json())
            .then(res => {
                if(res.code === 200) {
                    const u = res.data;
                    document.getElementById('card-nickname').textContent = u.nickname || '匿名用户';
                    document.getElementById('card-intro').textContent = u.intro || '这个人很懒，什么都没留下~';
                    document.getElementById('card-phone').textContent = u.phone || '未公开';
                    document.getElementById('card-email').textContent = u.email || '未公开';
                    // 统计数据
                    document.getElementById('card-likes').textContent = u.likeCount || 0;
                    document.getElementById('card-follows').textContent = u.followCount || 0;
                    // 关注按钮
                    const followBtn = document.getElementById('card-follow-btn');
                    if (u.isFollowed) { followBtn.textContent = '已关注'; followBtn.className = followBtn.className.replace('bg-indigo-600 hover:bg-indigo-700','bg-gray-100 text-gray-600 hover:bg-gray-200'); }
                    else { followBtn.textContent = '+ 关注'; followBtn.className = followBtn.className.replace('bg-gray-100 text-gray-600 hover:bg-gray-200','bg-indigo-600 text-white hover:bg-indigo-700'); }
                    followBtn.onclick = () => toggleFollowFromCard(studentId);
                    document.getElementById('card-msg-btn').onclick = () => sendMessageFromCard(studentId);

                    if(u.avatar) {
                        document.getElementById('card-avatar-wrap').innerHTML = `<img src="${u.avatar}" class="h-full w-full object-cover">`;
                    } else {
                        document.getElementById('card-avatar-wrap').innerHTML = `<div class="h-full w-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center text-white text-3xl font-bold">${(u.nickname || '?').charAt(0)}</div>`;
                    }
                }
            });
    }

    function closeUserCard() {
        document.getElementById('user-card-modal').classList.add('hidden');
    }

    function quitCommunity() {
        if (!confirm('确定要退出当前社群吗？退出后将无法发帖和参与活动。')) return;
        const fd = new URLSearchParams();
        fd.append('communityId', communityId);
        fetch('/api/student/community/quit', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    alert('已成功退出社群');
                    window.location.href = '/student/index';
                } else {
                    alert('❌ ' + res.msg);
                }
            });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toggleLike(postId) {
        const fd = new URLSearchParams();
        fd.append('postId', postId);
        fetch('/api/student/post/like', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    const btn = document.getElementById(`like-btn-${postId}`);
                    const cnt = document.getElementById(`like-count-${postId}`);
                    const svg = btn.querySelector('svg');
                    cnt.textContent = res.data.likeCount;
                    if (res.data.isLiked) {
                        btn.className = btn.className.replace('text-gray-400 hover:text-red-400','text-red-500');
                        svg.setAttribute('fill','currentColor');
                    } else {
                        btn.className = btn.className.replace('text-red-500','text-gray-400 hover:text-red-400');
                        svg.setAttribute('fill','none');
                    }
                }
            });
    }

    function toggleCommentBox(postId) {
        const box = document.getElementById(`comment-box-${postId}`);
        box.classList.toggle('hidden');
        if (!box.classList.contains('hidden')) {
            resetReply(postId);
            document.getElementById(`comment-input-${postId}`).focus();
        }
    }

    function prepareReply(postId, parentId, targetStudentId, targetName) {
        replyTargets[postId] = { parentId, replyToStudentId: targetStudentId };
        document.getElementById(`comment-box-${postId}`).classList.remove('hidden');
        const badge = document.getElementById(`reply-badge-${postId}`);
        badge.innerText = `回复 @${targetName}  ×`;
        badge.classList.remove('hidden');
        document.getElementById(`comment-input-${postId}`).focus();
    }

    function resetReply(postId) {
        delete replyTargets[postId];
        const badge = document.getElementById(`reply-badge-${postId}`);
        if (badge) badge.classList.add('hidden');
    }

    function submitComment(postId) {
        const content = document.getElementById(`comment-input-${postId}`).value.trim();
        if (!content) return alert('评论内容不能为空');
        const fd = new URLSearchParams();
        fd.append('postId', postId);
        fd.append('content', content);
        if (replyTargets[postId]) {
            fd.append('parentId', replyTargets[postId].parentId);
            fd.append('replyToStudentId', replyTargets[postId].replyToStudentId);
        } else {
            fd.append('parentId', 0);
        }
        fetch('/api/student/post/comment', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) {
                    document.getElementById(`comment-input-${postId}`).value = '';
                    resetReply(postId);
                    loadPosts();
                } else alert('❌ ' + res.msg);
            });
    }

    function loadActivities() {
        fetch(`/api/student/activity/list?communityId=${communityId}`)
            .then(r => r.json())
            .then(res => { if (res.code === 200) renderActivities(res.data); });
    }

    function renderActivities(activities) {
        const container = document.getElementById('activity-list-container');
        if (!activities || activities.length === 0) {
            container.innerHTML = '<div class="text-center text-sm text-gray-400 py-4">暂无活动发布</div>';
            return;
        }
        container.innerHTML = activities.map(act => {
            let btnHtml;
            if (act.isSigned === true) {
                const statusMap = {0:'审核中...', 1:'已通过', 2:'被拒绝'};
                const statusColor = act.signStatus === 1 ? 'text-green-600 bg-green-50' : act.signStatus === 2 ? 'text-red-500 bg-red-50' : 'text-yellow-600 bg-yellow-50';
                btnHtml = `<button disabled class="w-full ${statusColor} border border-current py-2 rounded-lg text-sm font-medium cursor-not-allowed">${statusMap[act.signStatus] || '审核中...'}</button>`;
            } else {
                btnHtml = `<button onclick="openSignModal(${act.id})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">立即报名</button>`;
            }
            return `
            <div class="border border-gray-100 rounded-xl p-4 hover:shadow-sm transition-shadow bg-gray-50">
                <h4 class="font-bold text-gray-800 text-sm mb-2">${escapeHtml(act.title)}</h4>
                <p class="text-xs text-gray-500 mb-1">🕒 ${formatTime(act.eventTime)}</p>
                <p class="text-xs text-gray-500 mb-3">📍 ${escapeHtml(act.location)}</p>
                <p class="text-xs text-gray-600 mb-3 line-clamp-2">${escapeHtml(act.content)}</p>
                <div class="text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded-full inline-block mb-3">已报名 ${act.signCount} 人</div>
                <div class="flex gap-2">
                    ${btnHtml}
                    <button onclick="showActivityDetail(${act.id})" class="flex-shrink-0 bg-gray-100 hover:bg-gray-200 text-gray-600 py-2 px-3 rounded-lg text-sm font-medium transition-colors">详情</button>
                </div>
            </div>`;
        }).join('');
    }

    function openEditPost(postId, currentContent) {
        editingPostId = postId;
        document.getElementById('edit-post-content').value = currentContent;
        document.getElementById('edit-post-modal').classList.remove('hidden');
        document.getElementById('edit-post-content').focus();
    }

    function closeEditPost() {
        editingPostId = null;
        document.getElementById('edit-post-modal').classList.add('hidden');
    }

    function saveEditPost() {
        if (!editingPostId) return;
        const content = document.getElementById('edit-post-content').value.trim();
        if (!content) return alert('内容不能为空');
        const fd = new URLSearchParams();
        fd.append('postId', editingPostId);
        fd.append('content', content);
        fetch('/api/student/post/update', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) { closeEditPost(); loadPosts(); }
                else alert('❌ ' + res.msg);
            });
    }

    function deleteMyPost(postId) {
        if (!confirm('确定要删除这条动态吗？')) return;
        const fd = new URLSearchParams();
        fd.append('postId', postId);
        fetch('/api/student/post/delete', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) loadPosts();
                else alert('❌ ' + res.msg);
            });
    }

    function signActivity(activityId) {
        const fd = new URLSearchParams();
        fd.append('activityId', activityId);
        fetch('/api/student/activity/sign', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) { alert('报名成功！'); loadActivities(); }
                else alert(res.msg);
            });
    }

    let pendingSignActivityId = null;
    function openSignModal(activityId) {
        pendingSignActivityId = activityId;
        document.getElementById('sign-realname').value = '';
        document.getElementById('sign-phone').value = '';
        document.getElementById('sign-remark').value = '';
        document.getElementById('sign-modal').classList.remove('hidden');
    }
    function closeSignModal() { document.getElementById('sign-modal').classList.add('hidden'); }
    function submitSign() {
        const realName = document.getElementById('sign-realname').value.trim();
        const phone = document.getElementById('sign-phone').value.trim();
        const remark = document.getElementById('sign-remark').value.trim();
        if (!realName || !phone) return alert('请填写真实姓名和联系电话');
        const fd = new URLSearchParams();
        fd.append('activityId', pendingSignActivityId);
        fd.append('realName', realName);
        fd.append('phone', phone);
        fd.append('remark', remark);
        fetch('/api/student/activity/sign', { method: 'POST', body: fd }).then(r => r.json()).then(res => {
            if (res.code === 200) { alert(res.msg); closeSignModal(); loadActivities(); }
            else alert(res.msg);
        });
    }

    function showActivityDetail(activityId) {
        document.getElementById('activity-detail-modal').classList.remove('hidden');
        document.getElementById('act-detail-body').innerHTML = '<p class="text-gray-400 text-sm">加载中...</p>';
        fetch(`/api/student/activity/list?communityId=${communityId}`).then(r => r.json()).then(res => {
            if (res.code === 200) {
                const act = res.data.find(a => a.id === activityId);
                if (act) {
                    document.getElementById('act-detail-body').innerHTML = `
                        <h4 class="text-lg font-bold text-gray-800 mb-3">${escapeHtml(act.title)}</h4>
                        <p class="text-sm text-gray-500 mb-1">🕒 活动时间：${formatTime(act.eventTime)}</p>
                        <p class="text-sm text-gray-500 mb-4">📍 活动地点：${escapeHtml(act.location)}</p>
                        <div class="bg-gray-50 rounded-lg p-4 border border-gray-100">
                            <p class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${escapeHtml(act.content)}</p>
                        </div>
                        <p class="text-xs text-indigo-600 mt-3">已报名 ${act.signCount} 人</p>`;
                }
            }
        });
    }

    function showCommunityInfo() {
        document.getElementById('community-info-modal').classList.remove('hidden');
        fetch(`/api/student/community/${communityId}/members`).then(r => r.json()).then(res => {
            if (res.code === 200) {
                document.getElementById('ci-name').textContent = res.data.communityName;
                document.getElementById('ci-desc').textContent = res.data.description || '暂无简介';
                document.getElementById('ci-count').textContent = res.data.memberCount + ' 人';
                renderMembersList(res.data.members);
            }
        });
    }
    function renderMembersList(members) {
        const container = document.getElementById('ci-members-list');
        if (!members || members.length === 0) { container.innerHTML = '<div class="text-gray-400 text-sm text-center py-4">暂无成员</div>'; return; }
        container.innerHTML = members.map(m => `
            <div class="flex items-center space-x-3 py-2 border-b border-gray-50 cursor-pointer hover:bg-gray-50 rounded-lg px-2" onclick="showUserCardFromMember(${m.studentId})">
                ${m.avatar ? `<img src="${m.avatar}" class="h-8 w-8 rounded-full object-cover flex-shrink-0">` : `<div class="h-8 w-8 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${(m.nickname||'?').charAt(0)}</div>`}
                <div><p class="text-sm font-medium text-gray-800">${escapeHtml(m.nickname||'匿名')}</p><p class="text-xs text-gray-400">${m.studentNo}</p></div>
            </div>`).join('');
    }
    function showUserCardFromMember(studentId) { showUserCard(studentId); }

    function showSearchModal() {
        document.getElementById('search-modal').classList.remove('hidden');
        document.getElementById('search-input').value = '';
        document.getElementById('search-results').innerHTML = '';
        document.getElementById('search-input').focus();
    }
    function doSearch() {
        const kw = document.getElementById('search-input').value.trim();
        if (!kw) return;
        fetch(`/api/student/community/${communityId}/search?keyword=${encodeURIComponent(kw)}`).then(r => r.json()).then(res => {
            const container = document.getElementById('search-results');
            if (res.code !== 200 || !res.data || res.data.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-sm text-center py-6">没有找到相关内容</div>';
                return;
            }
            container.innerHTML = res.data.map(p => `
                <div class="border border-gray-100 rounded-lg p-3 hover:bg-gray-50">
                    <p class="text-sm text-gray-800 whitespace-pre-wrap line-clamp-3">${escapeHtml(p.content)}</p>
                    <p class="text-xs text-gray-400 mt-1">${escapeHtml(p.authorName)} · ${formatTime(p.createTime)}</p>
                </div>`).join('');
        });
    }

    function showReportModal() {
        document.getElementById('report-modal').classList.remove('hidden');
        document.getElementById('report-reason').value = '';
    }
    function submitReport() {
        const reason = document.getElementById('report-reason').value.trim();
        if (!reason) return alert('请填写举报原因');
        const fd = new URLSearchParams();
        fd.append('communityId', communityId);
        fd.append('reason', reason);
        fetch('/api/student/community/report', { method: 'POST', body: fd }).then(r => r.json()).then(res => {
            alert(res.msg);
            if (res.code === 200) document.getElementById('report-modal').classList.add('hidden');
        });
    }

    // 关注按钮（在用户名片里）
    function toggleFollowFromCard(studentId) {
        const fd = new URLSearchParams(); fd.append('followedId', studentId);
        fetch('/api/student/follow/toggle', { method: 'POST', body: fd }).then(r => r.json()).then(res => {
            if (res.code === 200) {
                const btn = document.getElementById('card-follow-btn');
                if (res.data.isFollowed) { btn.textContent = '已关注'; btn.className = btn.className.replace('bg-indigo-600 hover:bg-indigo-700','bg-gray-100 text-gray-600 hover:bg-gray-200'); }
                else { btn.textContent = '+ 关注'; btn.className = btn.className.replace('bg-gray-100 text-gray-600 hover:bg-gray-200','bg-indigo-600 hover:bg-indigo-700'); }
            }
        });
    }
    function sendMessageFromCard(studentId) { window.location.href = `/student/messages?with=${studentId}`; }

    document.addEventListener('click', e => {
        const menu = document.getElementById('nav-user-menu');
        if (menu && !e.target.closest('#nav-user-menu') && !e.target.closest('[onclick*="nav-user-menu"]')) {
            menu.classList.add('hidden');
        }
    });
</script>
<!-- 报名 Modal -->
<div id="sign-modal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-6">
        <h3 class="font-bold text-gray-800 text-lg mb-4">填写报名信息</h3>
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-500 mb-1">真实姓名 <span class="text-red-400">*</span></label>
                <input type="text" id="sign-realname" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-indigo-500 text-sm" placeholder="请填写真实姓名"></div>
            <div><label class="block text-xs text-gray-500 mb-1">联系电话 <span class="text-red-400">*</span></label>
                <input type="tel" id="sign-phone" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-indigo-500 text-sm" placeholder="请填写联系电话"></div>
            <div><label class="block text-xs text-gray-500 mb-1">备注（可选）</label>
                <textarea id="sign-remark" rows="2" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-indigo-500 resize-none text-sm" placeholder="其他想说的..."></textarea></div>
            <p class="text-xs text-yellow-600 bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-2">提交后需要社群管理员审核，审核通过后即可参加活动。</p>
            <div class="flex space-x-3 mt-4">
                <button onclick="closeSignModal()" class="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 text-sm font-medium">取消</button>
                <button onclick="submitSign()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg text-sm font-medium">提交报名</button>
            </div>
        </div>
    </div>
</div>

<!-- 活动详情 Modal -->
<div id="activity-detail-modal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-800 text-lg">活动详情</h3>
            <button onclick="document.getElementById('activity-detail-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
        </div>
        <div id="act-detail-body" class="min-h-24"></div>
    </div>
</div>

<!-- 社群信息 Modal -->
<div id="community-info-modal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-6 max-h-[90vh] flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-800 text-lg">社群信息</h3>
            <button onclick="document.getElementById('community-info-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
        </div>
        <div class="mb-4">
            <h4 id="ci-name" class="text-xl font-bold text-indigo-700 mb-2"></h4>
            <p id="ci-desc" class="text-sm text-gray-600 leading-relaxed"></p>
        </div>
        <div class="flex space-x-2 mb-4">
            <button onclick="showReportModal()" class="px-4 py-2 text-sm bg-red-50 text-red-600 hover:bg-red-100 rounded-lg font-medium transition-colors">举报社群</button>
        </div>
        <div class="border-t border-gray-100 pt-4 flex-1 overflow-hidden flex flex-col">
            <div class="flex items-center justify-between mb-3">
                <h5 class="font-semibold text-gray-700 text-sm">群成员</h5>
                <span id="ci-count" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full"></span>
            </div>
            <div id="ci-members-list" class="overflow-y-auto space-y-1 flex-1"></div>
        </div>
    </div>
</div>

<!-- 搜索 Modal -->
<div id="search-modal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-800 text-lg">搜索社群内容</h3>
            <button onclick="document.getElementById('search-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
        </div>
        <div class="flex space-x-2 mb-4">
            <input type="text" id="search-input" class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-indigo-500 text-sm" placeholder="搜索帖子内容..." onkeydown="if(event.key==='Enter') doSearch()">
            <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium">搜索</button>
        </div>
        <div id="search-results" class="space-y-3 max-h-96 overflow-y-auto"></div>
    </div>
</div>

<!-- 举报 Modal -->
<div id="report-modal" class="hidden fixed inset-0 z-[70] bg-black/40 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-6">
        <h3 class="font-bold text-gray-800 text-lg mb-4">举报社群</h3>
        <div class="space-y-4">
            <div><label class="block text-xs text-gray-500 mb-1">举报原因 <span class="text-red-400">*</span></label>
                <textarea id="report-reason" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-red-400 resize-none text-sm" placeholder="请详细描述举报原因..."></textarea></div>
            <div class="flex space-x-3">
                <button onclick="document.getElementById('report-modal').classList.add('hidden')" class="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 text-sm font-medium">取消</button>
                <button onclick="submitReport()" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg text-sm font-medium">提交举报</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
